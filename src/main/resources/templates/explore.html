<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Explore — Vibe</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --dark: #5a5a5a;
            --black: #111;
            --white: #fff;
            --light: #f8f8f8;
            --border: #e0e0e0;
            --accent: #2563eb;
            --gold: #f4a118;
            --green: #2d9e6b;
            --radius-pill: 50px;
            --font: 'Inter', system-ui, sans-serif;
            --sidebar-w: 195px;
            --nav-h: 42px;
        }

        body { font-family: var(--font); background: var(--white); color: var(--black); font-size: 13px; }

        /* ── NAV ─────────────────────────────────────────────────────────── */
        nav {
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 1.75rem; height: var(--nav-h);
            background: var(--dark); position: sticky; top: 0; z-index: 200;
        }
        .nav-left  { display: flex; align-items: center; gap: 1.25rem; }
        .nav-logo  { width: 26px; height: 26px; background: #222; border-radius: 50%;
                     display: flex; align-items: center; justify-content: center;
                     color: white; font-weight: 800; font-size: 0.75rem; }
        .nav-link  { color: #fff; text-decoration: none; font-size: 0.82rem; opacity: 0.85; }
        .nav-link:hover { opacity: 1; }
        .nav-right { display: flex; align-items: center; gap: 0.75rem; }
        .btn-ghost-nav   { background: transparent; border: none; color: #fff;
                           font-size: 0.8rem; cursor: pointer; text-decoration: none; }
        .btn-outline-nav { background: transparent; border: 1.5px solid #fff; color: #fff;
                           font-size: 0.75rem; padding: 0.28rem 0.8rem;
                           border-radius: var(--radius-pill); text-decoration: none; }

        /* ── PAGE HEADER ─────────────────────────────────────────────────── */
        .page-header {
            background: var(--dark); color: white;
            text-align: center; padding: 1.5rem 1.5rem 1rem;
        }
        .page-header h1 { font-size: 1.55rem; font-weight: 600; letter-spacing: -0.2px; }

        /* ── TOP FILTER BAR ─────────────────────────────────────────────── */
        .top-bar {
            background: var(--white);
            border-bottom: 1px solid var(--border);
            padding: 0.55rem 1.5rem;
            display: flex; align-items: center; gap: 0.4rem;
        }

        /* Tab pills — these are real links that trigger a page reload with ?tab=... */
        .tab-pill {
            display: inline-flex; align-items: center;
            padding: 0.28rem 0.85rem;
            border: 1.5px solid var(--border);
            border-radius: var(--radius-pill);
            font-size: 0.74rem; font-weight: 600;
            text-decoration: none; color: var(--black);
            transition: all 0.12s; white-space: nowrap;
            background: var(--white);
        }
        .tab-pill:hover { border-color: #aaa; }
        .tab-pill.active { background: var(--black); color: white; border-color: var(--black); }

        .search-wrap {
            margin-left: auto;
            display: flex; align-items: center;
            border: 1.5px solid var(--border);
            border-radius: var(--radius-pill);
            padding: 0.25rem 0.8rem; gap: 0.35rem;
            background: var(--white); min-width: 175px;
        }
        .search-icon { width: 12px; height: 12px; flex-shrink: 0; color: #aaa; }
        .search-input {
            border: none; outline: none; font-size: 0.78rem;
            font-family: var(--font); width: 100%; background: transparent; color: var(--black);
        }
        .search-input::placeholder { color: #bbb; }

        /* ── ACTIVE FILTER STRIP ────────────────────────────────────────── */
        .active-filters-strip {
            display: none; align-items: center; gap: 0.4rem; flex-wrap: wrap;
            padding: 0.45rem 1.5rem;
            background: #fafafa; border-bottom: 1px solid var(--border);
            font-size: 0.74rem;
        }
        .active-filters-strip.show { display: flex; }
        .active-filter-chip {
            display: inline-flex; align-items: center; gap: 0.3rem;
            padding: 0.18rem 0.5rem 0.18rem 0.65rem;
            background: var(--black); color: white;
            border-radius: var(--radius-pill); font-size: 0.68rem; font-weight: 600;
        }
        .active-filter-chip button {
            background: rgba(255,255,255,0.2); border: none; color: white;
            width: 13px; height: 13px; border-radius: 50%;
            cursor: pointer; display: flex; align-items: center; justify-content: center;
            font-size: 0.48rem; padding: 0; flex-shrink: 0; font-family: var(--font);
        }
        .active-filter-chip button:hover { background: rgba(255,255,255,0.35); }
        .clear-all-btn {
            margin-left: auto; font-size: 0.7rem; color: #888;
            cursor: pointer; background: none; border: none; font-family: var(--font);
        }
        .clear-all-btn:hover { color: var(--black); }

        /* ── LAYOUT ──────────────────────────────────────────────────────── */
        .layout {
            display: grid;
            grid-template-columns: var(--sidebar-w) 1fr;
            min-height: calc(100vh - var(--nav-h) - 90px);
        }

        /* ── SIDEBAR ─────────────────────────────────────────────────────── */
        .sidebar {
            border-right: 1px solid var(--border);
            padding: 1.1rem 0.65rem 2rem;
            position: sticky;
            top: var(--nav-h);
            height: calc(100vh - var(--nav-h));
            overflow-y: auto;
        }
        .sidebar::-webkit-scrollbar { width: 3px; }
        .sidebar::-webkit-scrollbar-thumb { background: #ddd; border-radius: 2px; }

        .filter-group { margin-bottom: 1.35rem; }

        .filter-group-header {
            font-size: 0.62rem; font-weight: 800;
            text-transform: uppercase; letter-spacing: 0.1em;
            color: #999; margin-bottom: 0.4rem;
            padding: 0 0.3rem;
            display: flex; align-items: center; justify-content: space-between;
        }
        .filter-group-clear {
            font-size: 0.62rem; color: var(--accent); cursor: pointer;
            font-weight: 600; text-transform: none; letter-spacing: 0;
            background: none; border: none; font-family: var(--font);
            display: none;
        }
        .filter-group-clear.show { display: block; }
        .filter-group-clear:hover { text-decoration: underline; }

        .filter-sep { border: none; border-top: 1px solid var(--border); margin: 1.1rem 0; }

        .filter-item {
            display: flex; align-items: center; gap: 0.35rem;
            padding: 0.28rem 0.45rem; border-radius: 7px;
            cursor: pointer; user-select: none;
            font-size: 0.76rem; color: #444;
            transition: background 0.1s, color 0.1s;
            position: relative;
        }
        .filter-item:hover { background: var(--light); color: var(--black); }
        .filter-item.active { background: #efefef; color: var(--black); font-weight: 600; }
        .filter-item.active::before {
            content: '';
            position: absolute; left: 0; top: 20%; height: 60%; width: 3px;
            background: var(--black); border-radius: 0 2px 2px 0;
        }
        .filter-item-icon {
            width: 14px; height: 14px; border-radius: 3px;
            object-fit: contain; flex-shrink: 0;
        }

        /* ── APP SECTIONS ────────────────────────────────────────────────── */
        .content { padding: 1.25rem 1.5rem 3rem; }

        .section { margin-bottom: 2rem; }

        .section-title {
            font-size: 0.65rem; font-weight: 800;
            text-transform: uppercase; letter-spacing: 0.1em;
            color: #888; margin-bottom: 0.75rem;
            padding-bottom: 0.45rem;
            border-bottom: 1px solid var(--border);
        }

        /* ── APP CARD ────────────────────────────────────────────────────── */
        .app-card {
            display: flex; align-items: center;
            padding: 0.7rem 0.9rem;
            border: 1.5px solid var(--border); border-radius: 13px;
            margin-bottom: 0.45rem;
            text-decoration: none; color: inherit;
            gap: 0.75rem;
            max-width: 1000px;
            transition: border-color 0.12s;
        }
        .app-card:hover { border-color: #bbb; }

        .app-icon {
            width: 40px; height: 40px; border-radius: 9px;
            border: 1.5px solid var(--border); flex-shrink: 0;
            background: var(--light); overflow: hidden;
            display: flex; align-items: center; justify-content: center;
            font-size: 1rem; color: #ccc;
        }
        .app-icon img { width: 100%; height: 100%; object-fit: cover; }

        .app-body { flex: 1; min-width: 0; }
        .app-name {
            font-size: 0.84rem; font-weight: 700;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
            margin-bottom: 0.15rem;
        }
        .app-desc {
            font-size: 0.72rem; color: #666; line-height: 1.4;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }

        .app-card-right {
            display: flex; flex-direction: column; align-items: flex-end;
            gap: 0.3rem; flex-shrink: 0;
        }

        /* Dual rating row */
        .rating-row { display: flex; align-items: center; gap: 0.3rem; }
        .rating-block { display: flex; align-items: center; gap: 0.2rem; }
        .rating-sep { color: #ddd; font-size: 0.65rem; }

        .stars { display: flex; gap: 1px; }
        .star  { font-size: 0.68rem; color: #ddd; }
        .star.lit-user     { color: var(--gold); }
        .star.lit-verified { color: #3b82f6; }   /* blue stars for verified */

        .rating-count { font-size: 0.62rem; color: #bbb; }

        .app-price {
            font-size: 0.68rem; font-weight: 700;
            padding: 0.15rem 0.5rem;
            border: 1.5px solid var(--border); border-radius: var(--radius-pill);
            color: #666;
        }
        .app-price.free { border-color: #6ee7b7; color: var(--green); background: #f0fdf4; }

        /* Empty section state */
        .empty-section {
            color: #ccc; font-size: 0.78rem; text-align: center;
            padding: 1.5rem 0;
        }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
</head>
<body>

<nav>
    <div class="nav-left">
        <div class="nav-logo">V</div>
        <a class="nav-link" th:href="@{/submit}">Submit</a>
        <a class="nav-link" th:href="@{/explore}">Explore</a>
    </div>
    <div class="nav-right">
        <a class="btn-ghost-nav" th:href="@{/login}">Sign in</a>
        <a class="btn-outline-nav" th:href="@{/register}">Sign up</a>
    </div>
</nav>

<div class="page-header">
    <h1>Explore</h1>
</div>

<!--
  Top filter bar.
  Tab pills are standard <a> links so the server re-renders the correct sections.
  They preserve the currently-selected sidebar filters via JS-built URLs.
-->
<div class="top-bar">
    <a class="tab-pill"
       th:classappend="${tab == 'top-rated'} ? ' active' : ''"
       th:href="@{/explore(tab='top-rated')}"
       id="tabTopRated">Top rated</a>

    <a class="tab-pill"
       th:classappend="${tab == 'new'} ? ' active' : ''"
       th:href="@{/explore(tab='new')}"
       id="tabNew">NEW</a>

    <a class="tab-pill"
       th:classappend="${tab == 'verified'} ? ' active' : ''"
       th:href="@{/explore(tab='verified')}"
       id="tabVerified">Verified</a>

    <div class="search-wrap">
        <svg class="search-icon" xmlns="http://www.w3.org/2000/svg" fill="none"
             viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
            <circle cx="11" cy="11" r="7"/><path d="M21 21l-4.35-4.35"/>
        </svg>
        <input class="search-input" type="text" id="searchInput" placeholder="Find an app..."/>
    </div>
</div>

<!-- Active-filter summary strip (JS-managed) -->
<div class="active-filters-strip" id="activeFiltersStrip">
    <button class="clear-all-btn" onclick="clearAllFilters()">Clear all</button>
</div>

<div class="layout">

    <!-- ── SIDEBAR ─────────────────────────────────────────────────────── -->
    <aside class="sidebar">
        <th:block th:each="cat, catStat : ${filterEntries.entrySet()}"
                  th:with="catId=${cat.key.id}">

            <hr class="filter-sep" th:if="${!catStat.first}"/>

            <div class="filter-group" th:id="'fg-' + ${catId}">
                <div class="filter-group-header">
                    <span th:text="'ALL ' + ${cat.key.name.toUpperCase()}">ALL CATEGORIES</span>
                    <button class="filter-group-clear"
                            th:id="'clear-' + ${catId}"
                            th:data-cat-id="${catId}"
                            onclick="clearGroup(this.dataset.catId)">Clear</button>
                </div>

                <div th:each="entry : ${cat.value}"
                     class="filter-item"
                     th:id="'fi-' + ${entry.id}"
                     th:data-entry-id="${entry.id}"
                     th:data-entry-name="${entry.name}"
                     th:data-cat-id="${catId}"
                     th:classappend="${#lists.contains(selectedEntryIds, entry.id.toString())} ? ' active' : ''"
                     onclick="toggleFilter(this)">
                    <img th:if="${entry.iconUrl != null}"
                         th:src="${entry.iconUrl}"
                         th:alt="${entry.name}"
                         class="filter-item-icon"/>
                    <span th:text="${entry.name}">Entry</span>
                </div>
            </div>
        </th:block>

        <div th:if="${#maps.isEmpty(filterEntries)}"
             style="color:#ccc;font-size:0.75rem;text-align:center;padding:2rem 0.5rem;line-height:1.6;">
            No filter categories.<br/>
            <a th:href="@{/categories}" style="color:var(--accent);">Manage →</a>
        </div>
    </aside>

    <!-- ── CONTENT: two sections ────────────────────────────────────────── -->
    <main class="content" id="mainContent">

        <!-- Section 1 -->
        <div class="section">
            <div class="section-title" th:text="${section1Title}">SECTION 1</div>

            <div th:if="${#lists.isEmpty(section1Apps)}" class="empty-section">
                No apps yet in this section.
            </div>

            <th:block th:each="app : ${section1Apps}">
                <a class="app-card"
                   th:href="@{/apps/{id}/manage(id=${app.id})}"
                   th:data-name="${app.name.toLowerCase()}"
                   th:data-desc="${app.description != null ? app.description.toLowerCase() : ''}">

                    <div class="app-icon">
                        <img th:if="${app.iconUrl != null}" th:src="${app.iconUrl}" alt=""/>
                        <span th:if="${app.iconUrl == null}">🖼</span>
                    </div>

                    <div class="app-body">
                        <div class="app-name" th:text="${app.name}">App Name</div>
                        <div class="app-desc"
                             th:text="${app.description != null ? app.description : 'No description'}">
                        </div>
                    </div>

                    <div class="app-card-right">
                        <div class="rating-row">
                            <!-- User rating (gold stars) -->
                            <div class="rating-block">
                                <div class="stars">
                                    <span th:each="i : ${#numbers.sequence(1,5)}"
                                          class="star"
                                          th:classappend="${app.userRatingAvg >= i} ? ' lit-user' : ''">★</span>
                                </div>
                                <span class="rating-count" th:text="${app.userRatingCount}">0</span>
                            </div>
                            <span class="rating-sep">|</span>
                            <!-- Verified rating (blue stars) — show dashes if not rated -->
                            <div class="rating-block">
                                <div class="stars" th:if="${app.verifiedScore != null}">
                                    <span th:each="i : ${#numbers.sequence(1,5)}"
                                          class="star"
                                          th:classappend="${app.verifiedScore >= i} ? ' lit-verified' : ''">★</span>
                                </div>
                                <span th:if="${app.verifiedScore == null}"
                                      style="font-size:0.62rem;color:#ddd;">—</span>
                            </div>
                        </div>
                        <span class="app-price free">FREE</span>
                    </div>
                </a>
            </th:block>
        </div>

        <!-- Section 2 -->
        <div class="section">
            <div class="section-title" th:text="${section2Title}">SECTION 2</div>

            <div th:if="${#lists.isEmpty(section2Apps)}" class="empty-section">
                No apps yet in this section.
            </div>

            <th:block th:each="app : ${section2Apps}">
                <a class="app-card"
                   th:href="@{/apps/{id}/manage(id=${app.id})}"
                   th:data-name="${app.name.toLowerCase()}"
                   th:data-desc="${app.description != null ? app.description.toLowerCase() : ''}">

                    <div class="app-icon">
                        <img th:if="${app.iconUrl != null}" th:src="${app.iconUrl}" alt=""/>
                        <span th:if="${app.iconUrl == null}">🖼</span>
                    </div>

                    <div class="app-body">
                        <div class="app-name" th:text="${app.name}">App Name</div>
                        <div class="app-desc"
                             th:text="${app.description != null ? app.description : 'No description'}">
                        </div>
                    </div>

                    <div class="app-card-right">
                        <div class="rating-row">
                            <div class="rating-block">
                                <div class="stars">
                                    <span th:each="i : ${#numbers.sequence(1,5)}"
                                          class="star"
                                          th:classappend="${app.userRatingAvg >= i} ? ' lit-user' : ''">★</span>
                                </div>
                                <span class="rating-count" th:text="${app.userRatingCount}">0</span>
                            </div>
                            <span class="rating-sep">|</span>
                            <div class="rating-block">
                                <div class="stars" th:if="${app.verifiedScore != null}">
                                    <span th:each="i : ${#numbers.sequence(1,5)}"
                                          class="star"
                                          th:classappend="${app.verifiedScore >= i} ? ' lit-verified' : ''">★</span>
                                </div>
                                <span th:if="${app.verifiedScore == null}"
                                      style="font-size:0.62rem;color:#ddd;">—</span>
                            </div>
                        </div>
                        <span class="app-price free">FREE</span>
                    </div>
                </a>
            </th:block>
        </div>

    </main>
</div>

<!-- Hidden form for sidebar filter submissions (preserves active tab) -->
<form id="filterForm" th:action="@{/explore}" method="get" style="display:none;">
    <input type="hidden" name="tab" id="tabInput" th:value="${tab}"/>
    <div id="filterInputs"></div>
</form>

<script th:inline="javascript">
    // ── State ────────────────────────────────────────────────────────────────
    const preSelected = /*[[${selectedEntryIds}]]*/ [];
    const currentTab  = /*[[${tab}]]*/ 'top-rated';

    let selectedIds = new Set(preSelected.map(String));

    // Build entry metadata cache
    const entryMeta = {};
    document.querySelectorAll('.filter-item[data-entry-id]').forEach(el => {
        entryMeta[el.dataset.entryId] = { name: el.dataset.entryName, catId: el.dataset.catId };
    });

    // ── Sidebar filter toggle ────────────────────────────────────────────────
    function toggleFilter(el) {
        const id = el.dataset.entryId;
        if (selectedIds.has(id)) {
            selectedIds.delete(id);
            el.classList.remove('active');
        } else {
            selectedIds.add(id);
            el.classList.add('active');
        }
        renderActiveStrip();
        submitFilters();
    }

    function clearGroup(catId) {
        document.querySelectorAll(`.filter-item[data-cat-id="${catId}"]`).forEach(el => {
            selectedIds.delete(el.dataset.entryId);
            el.classList.remove('active');
        });
        renderActiveStrip();
        submitFilters();
    }

    function clearAllFilters() {
        selectedIds.clear();
        document.querySelectorAll('.filter-item.active').forEach(el => el.classList.remove('active'));
        renderActiveStrip();
        submitFilters();
    }

    function removeChip(id) {
        selectedIds.delete(id);
        const el = document.getElementById('fi-' + id);
        if (el) el.classList.remove('active');
        renderActiveStrip();
        submitFilters();
    }

    // ── Submit filter form (preserves current tab) ───────────────────────────
    function submitFilters() {
        document.getElementById('tabInput').value = currentTab;
        const container = document.getElementById('filterInputs');
        container.innerHTML = '';
        selectedIds.forEach(id => {
            const inp = document.createElement('input');
            inp.type = 'hidden'; inp.name = 'entries'; inp.value = id;
            container.appendChild(inp);
        });
        document.getElementById('filterForm').submit();
    }

    // ── Tab pills: rebuild href to carry current filters ─────────────────────
    // Runs on page load so tab links always include the active entry filters.
    (function patchTabLinks() {
        const entryParams = [...selectedIds].map(id => `entries=${encodeURIComponent(id)}`).join('&');
        document.querySelectorAll('.tab-pill').forEach(link => {
            const base = link.getAttribute('href').split('?')[0];
            const tabParam = link.id === 'tabTopRated' ? 'top-rated'
                           : link.id === 'tabNew'      ? 'new'
                           : 'verified';
            const qs = entryParams ? `tab=${tabParam}&${entryParams}` : `tab=${tabParam}`;
            link.href = `${base}?${qs}`;
        });
    })();

    // ── Active filter chip strip ─────────────────────────────────────────────
    function renderActiveStrip() {
        const strip    = document.getElementById('activeFiltersStrip');
        const clearBtn = strip.querySelector('.clear-all-btn');
        strip.querySelectorAll('.active-filter-chip').forEach(c => c.remove());

        if (selectedIds.size === 0) {
            strip.classList.remove('show');
        } else {
            strip.classList.add('show');
            selectedIds.forEach(id => {
                const meta = entryMeta[id]; if (!meta) return;
                const chip = document.createElement('span');
                chip.className = 'active-filter-chip';
                chip.innerHTML = `${meta.name}<button onclick="removeChip('${id}')">✕</button>`;
                strip.insertBefore(chip, clearBtn);
            });
        }

        // Per-group clear button visibility
        const usedCats = new Set([...selectedIds].map(id => entryMeta[id]?.catId));
        document.querySelectorAll('.filter-group-clear').forEach(btn => {
            btn.classList.toggle('show', usedCats.has(btn.dataset.catId));
        });
    }

    // ── Client-side search (instant, within visible cards only) ─────────────
    document.getElementById('searchInput').addEventListener('input', function () {
        const q = this.value.toLowerCase().trim();
        document.querySelectorAll('#mainContent .app-card').forEach(card => {
            const match = !q
                || (card.dataset.name || '').includes(q)
                || (card.dataset.desc || '').includes(q);
            card.style.display = match ? '' : 'none';
        });
    });

    // ── Init ─────────────────────────────────────────────────────────────────
    renderActiveStrip();
</script>

</body>
</html>
