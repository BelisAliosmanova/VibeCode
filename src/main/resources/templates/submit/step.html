<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title th:text="${category.name} + ' — Submit App'">Step</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --dark: #5a5a5a; --black: #111; --white: #fff;
            --border: #ddd; --radius-pill: 50px; --font: 'Inter', system-ui, sans-serif;
        }
        body { font-family: var(--font); background: var(--white); color: var(--black); }

        nav { display: flex; align-items: center; justify-content: space-between; padding: 0.85rem 2rem; background: var(--dark); }
        .nav-left { display: flex; align-items: center; gap: 1.5rem; }
        .nav-logo { width: 32px; height: 32px; background: #222; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; font-weight: 800; font-size: 0.9rem; }
        .nav-link { color: #fff; text-decoration: none; font-size: 0.9rem; }
        .nav-right { display: flex; align-items: center; gap: 1rem; }
        .btn-ghost { background: transparent; border: none; color: #fff; font-size: 0.9rem; cursor: pointer; text-decoration: none; }
        .btn-outline { background: transparent; border: 1.5px solid #fff; color: #fff; font-size: 0.85rem; padding: 0.4rem 1rem; border-radius: var(--radius-pill); text-decoration: none; }

        /* Progress */
        .progress-bar { height: 3px; background: #eee; }
        .progress-fill { height: 100%; background: var(--black); transition: width 0.3s; }

        .page { max-width: 560px; margin: 2.5rem auto; padding: 0 1.5rem; }

        /* App identity strip */
        .app-strip {
            display: flex; align-items: center; gap: 0.75rem;
            padding: 0.85rem 1rem; border: 1.5px solid var(--border);
            border-radius: 14px; margin-bottom: 1.75rem; background: #fafafa;
        }
        .app-icon {
            width: 44px; height: 44px; border-radius: 10px;
            border: 1px solid var(--border); overflow: hidden;
            background: var(--white); display: flex; align-items: center; justify-content: center;
            flex-shrink: 0; font-size: 1.2rem; color: #ccc;
        }
        .app-icon img { width: 100%; height: 100%; object-fit: cover; }
        .app-info .app-name { font-size: 0.92rem; font-weight: 700; }
        .app-info .app-url { font-size: 0.75rem; color: #aaa; }

        /* Step indicator */
        .step-indicator { font-size: 0.72rem; color: #aaa; margin-bottom: 0.5rem; }

        /* Section header */
        .section-header { display: flex; align-items: center; gap: 1rem; margin-bottom: 1rem; }
        .section-title { font-size: 0.72rem; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; }

        /* Search */
        .search-wrap {
            display: flex; align-items: center;
            border: 1.5px solid var(--border); border-radius: var(--radius-pill);
            padding: 0.3rem 0.85rem; gap: 0.5rem; flex: 1;
        }
        .search-wrap input { border: none; outline: none; font-size: 0.82rem; font-family: var(--font); width: 100%; }
        .search-wrap input::placeholder { color: #aaa; }
        .divider { color: #ccc; }

        .selected-pills { display: flex; flex-wrap: wrap; gap: 0.4rem; margin-bottom: 0.6rem; min-height: 32px; }
        .info-text { font-size: 0.78rem; color: #888; margin-bottom: 1rem; }
        .description { font-size: 0.82rem; color: #666; margin-bottom: 1.25rem; line-height: 1.5; }
        .options-pills { display: flex; flex-wrap: wrap; gap: 0.4rem; margin-bottom: 2rem; }

        .pill {
            display: inline-flex; align-items: center; gap: 0.3rem;
            padding: 0.3rem 0.85rem; border-radius: var(--radius-pill);
            font-size: 0.78rem; font-weight: 500; cursor: pointer;
            border: 1.5px solid #ccc; background: var(--white); color: var(--black);
            transition: all 0.12s; user-select: none;
        }
        .pill:hover { border-color: var(--black); }
        .pill.selected { background: var(--black); color: var(--white); border-color: var(--black); }

        /* Actions */
        .actions { display: flex; align-items: center; gap: 1rem; }
        .btn-black {
            background: var(--black); color: #fff; border: none;
            padding: 0.7rem 2.5rem; border-radius: var(--radius-pill);
            font-size: 0.9rem; font-weight: 600; cursor: pointer;
        }
        .btn-black:hover { background: #333; }
        .btn-skip {
            background: transparent; border: none;
            color: #aaa; font-size: 0.85rem; cursor: pointer;
            text-decoration: underline; font-family: var(--font);
        }
        .btn-skip:hover { color: #666; }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
</head>
<body>

<nav>
    <div class="nav-left">
        <div class="nav-logo">V</div>
        <a th:href="@{/submit}" class="nav-link">Submit</a>
        <a th:href="@{/explore}" class="nav-link">Explore</a>
    </div>
    <div class="nav-right">
        <a th:href="@{/login}" class="btn-ghost">Sign in</a>
        <a th:href="@{/register}" class="btn-outline">Sign up</a>
    </div>
</nav>

<!-- Progress bar -->
<div class="progress-bar">
    <div class="progress-fill"
         th:style="'width: ' + (${stepNumber} * 100 / ${totalSteps}) + '%'"></div>
</div>

<form th:action="@{/submit/step}" method="post" id="stepForm">
    <input type="hidden" th:name="appId" th:value="${app.id}"/>
    <input type="hidden" th:name="categoryId" th:value="${category.id}"/>
    <input type="hidden" th:name="nextCategoryId"
           th:value="${nextCategory != null ? nextCategory.id : null}" id="nextCategoryId"/>
    <div id="entryInputs"></div>

    <div class="page">

        <!-- App identity strip -->
        <div class="app-strip">
            <div class="app-icon">
                <img th:if="${app.iconUrl != null}" th:src="${app.iconUrl}" alt="icon"/>
                <span th:if="${app.iconUrl == null}">🖼</span>
            </div>
            <div class="app-info">
                <div class="app-name" th:text="${app.name}">App Name</div>
                <div class="app-url" th:text="${app.url}">https://...</div>
            </div>
        </div>

        <div class="step-indicator"
             th:text="'Step ' + ${stepNumber} + ' of ' + ${totalSteps}">Step 2 of 5</div>

        <div class="section-header">
            <div class="section-title" th:text="${category.name}">Category Name</div>
            <div class="search-wrap"
                 th:if="${#lists.size(entries) > 8 or category.allowCustom}">
                <input type="text" id="searchInput" placeholder="Search..."/>
                <th:block th:if="${category.allowCustom}">
                    <span class="divider">|</span>
                    <input type="text" id="customInput" placeholder="Add custom"/>
                </th:block>
            </div>
        </div>

        <p class="description"
           th:if="${category.description != null and !category.description.isEmpty()}"
           th:text="${category.description}"></p>

        <div class="selected-pills" id="selectedPills"></div>
        <div class="info-text" id="infoText">Click below to add</div>

        <div class="options-pills" id="optionPills">
            <span th:each="entry : ${entries}"
                  class="pill"
                  th:data-id="${entry.id}"
                  th:data-name="${entry.name}"
                  th:classappend="${#lists.contains(selectedIds, entry.id)} ? ' selected' : ''"
                  th:text="${entry.name}">Entry</span>
        </div>

        <div class="actions">
            <button type="submit" class="btn-black"
                    th:text="${isLastStep} ? 'Submit App' : 'Update'">Update</button>
            <button type="button" class="btn-skip" onclick="skipStep()">Skip</button>
        </div>
    </div>
</form>

<script th:inline="javascript">
    const MAX = /*[[${category.maxSelected}]]*/ null;
    const IS_SINGLE = MAX === 1;

    let selected = new Map(
        [...document.querySelectorAll('.pill.selected')]
            .map(p => [p.dataset.id, p.dataset.name])
    );

    document.querySelectorAll('#optionPills .pill').forEach(pill => {
        pill.addEventListener('click', () => toggle(pill));
    });

    const searchInput = document.getElementById('searchInput');
    if (searchInput) {
        searchInput.addEventListener('input', function () {
            const q = this.value.toLowerCase();
            document.querySelectorAll('#optionPills .pill').forEach(p => {
                p.style.display = p.dataset.name.toLowerCase().includes(q) ? '' : 'none';
            });
        });
    }

    const customInput = document.getElementById('customInput');
    if (customInput) {
        customInput.addEventListener('keydown', function (e) {
            if (e.key !== 'Enter') return;
            e.preventDefault();
            const name = this.value.trim();
            if (!name) return;
            if (MAX && selected.size >= MAX) return;
            const id = 'custom-' + Date.now();
            selected.set(id, name);
            const pill = document.createElement('span');
            pill.className = 'pill selected';
            pill.dataset.id = id;
            pill.dataset.name = name;
            pill.textContent = name;
            pill.addEventListener('click', () => toggle(pill));
            document.getElementById('optionPills').appendChild(pill);
            this.value = '';
            render();
        });
    }

    function toggle(pill) {
        const id = pill.dataset.id, name = pill.dataset.name;
        if (selected.has(id)) {
            selected.delete(id);
            pill.classList.remove('selected');
        } else {
            if (IS_SINGLE) {
                selected.clear();
                document.querySelectorAll('#optionPills .pill.selected')
                    .forEach(p => p.classList.remove('selected'));
            }
            if (MAX && selected.size >= MAX) return;
            selected.set(id, name);
            pill.classList.add('selected');
        }
        render();
    }

    function render() {
        const sp = document.getElementById('selectedPills');
        sp.innerHTML = '';
        selected.forEach((name, id) => {
            const pill = document.createElement('span');
            pill.className = 'pill selected';
            pill.textContent = name + ' ✕';
            pill.addEventListener('click', () => {
                selected.delete(id);
                const opt = document.querySelector(`#optionPills .pill[data-id="${id}"]`);
                if (opt) opt.classList.remove('selected');
                render();
            });
            sp.appendChild(pill);
        });

        const info = document.getElementById('infoText');
        if (MAX) {
            const left = MAX - selected.size;
            info.textContent = IS_SINGLE
                ? (selected.size === 1 ? 'Selected' : 'Choose one')
                : `Click below to add (${left} left)`;
        } else {
            info.textContent = `${selected.size} selected`;
        }

        const container = document.getElementById('entryInputs');
        container.innerHTML = '';
        selected.forEach((name, id) => {
            const inp = document.createElement('input');
            inp.type = 'hidden';
            inp.name = id.startsWith('custom-') ? 'customEntries' : 'entryIds';
            inp.value = id.startsWith('custom-') ? name : id;
            container.appendChild(inp);
        });
    }

    function skipStep() {
        selected.clear();
        document.querySelectorAll('#optionPills .pill').forEach(p => p.classList.remove('selected'));
        render();
        document.getElementById('stepForm').submit();
    }

    render();
</script>

</body>
</html>
