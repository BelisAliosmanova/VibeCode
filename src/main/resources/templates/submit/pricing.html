<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Pricing — Submit App</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --dark: #5a5a5a; --black: #111; --white: #fff;
            --border: #ddd; --radius-pill: 50px; --font: 'Inter', system-ui, sans-serif;
        }
        body { font-family: var(--font); background: var(--white); color: var(--black); }

        nav { display: flex; align-items: center; justify-content: space-between; padding: 0.85rem 2rem; background: var(--dark); }
        .nav-left { display: flex; align-items: center; gap: 1.5rem; }
        .nav-logo { width: 32px; height: 32px; background: #222; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; font-weight: 800; font-size: 0.9rem; }
        .nav-link { color: #fff; text-decoration: none; font-size: 0.9rem; }
        .nav-right { display: flex; align-items: center; gap: 1rem; }
        .btn-ghost { background: transparent; border: none; color: #fff; font-size: 0.9rem; cursor: pointer; text-decoration: none; }
        .btn-outline { background: transparent; border: 1.5px solid #fff; color: #fff; font-size: 0.85rem; padding: 0.4rem 1rem; border-radius: var(--radius-pill); text-decoration: none; }

        .page { max-width: 560px; margin: 3rem auto; padding: 0 1.5rem; }

        .section-title {
            font-size: 0.72rem; font-weight: 700; letter-spacing: 0.12em;
            text-transform: uppercase; margin-bottom: 0.35rem;
        }

        .note { font-size: 0.75rem; color: #aaa; margin-bottom: 1.25rem; }

        .options-pills { display: flex; flex-wrap: wrap; gap: 0.4rem; margin-bottom: 2rem; }

        .pill {
            display: inline-flex; align-items: center;
            padding: 0.3rem 0.85rem; border-radius: var(--radius-pill);
            font-size: 0.78rem; font-weight: 500; cursor: pointer;
            border: 1.5px solid #ccc; background: var(--white); color: var(--black);
            transition: all 0.12s; user-select: none;
        }
        .pill:hover { border-color: var(--black); }
        .pill.selected { background: var(--black); color: var(--white); border-color: var(--black); }

        .btn-black {
            background: var(--black); color: #fff; border: none;
            padding: 0.7rem 2.5rem; border-radius: var(--radius-pill);
            font-size: 0.9rem; font-weight: 600; cursor: pointer;
        }
        .btn-black:hover { background: #333; }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
</head>
<body>

<nav>
    <div class="nav-left">
        <div class="nav-logo">V</div>
        <a th:href="@{/submit}" class="nav-link">Submit</a>
        <a th:href="@{/explore}" class="nav-link">Explore</a>
    </div>
    <div class="nav-right">
        <a th:href="@{/login}" class="btn-ghost">Sign in</a>
        <a th:href="@{/register}" class="btn-outline">Sign up</a>
    </div>
</nav>

<form th:action="@{/submit/pricing}" method="post">
    <input type="hidden" th:name="appId" th:value="${app.id}"/>
    <input type="hidden" name="pricing" id="pricingInput" th:value="${selectedPricing}"/>

    <div class="page">
        <div class="section-title">Pricing</div>
        <div class="note">(Only one can be selected)</div>

        <div class="options-pills">
            <span th:each="p : ${pricingOptions}"
                  class="pill"
                  th:data-value="${p.name()}"
                  th:classappend="${selectedPricing != null and selectedPricing == p.name()} ? ' selected' : ''"
                  th:text="${p.label}">Option</span>
        </div>

        <button type="submit" class="btn-black">Update</button>
    </div>
</form>

<script>
    document.querySelectorAll('.pill').forEach(pill => {
        pill.addEventListener('click', () => {
            document.querySelectorAll('.pill').forEach(p => p.classList.remove('selected'));
            pill.classList.add('selected');
            document.getElementById('pricingInput').value = pill.dataset.value;
        });
    });
</script>

</body>
</html>
