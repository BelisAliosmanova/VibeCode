<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Made With — Submit App</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --dark: #5a5a5a; --black: #111; --white: #fff;
            --border: #ddd; --radius-pill: 50px; --font: 'Inter', system-ui, sans-serif;
        }
        body { font-family: var(--font); background: var(--white); color: var(--black); }

        nav { display: flex; align-items: center; justify-content: space-between; padding: 0.85rem 2rem; background: var(--dark); }
        .nav-left { display: flex; align-items: center; gap: 1.5rem; }
        .nav-logo { width: 32px; height: 32px; background: #222; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; font-weight: 800; font-size: 0.9rem; }
        .nav-link { color: #fff; text-decoration: none; font-size: 0.9rem; }
        .nav-right { display: flex; align-items: center; gap: 1rem; }
        .btn-ghost { background: transparent; border: none; color: #fff; font-size: 0.9rem; cursor: pointer; text-decoration: none; }
        .btn-outline-nav { background: transparent; border: 1.5px solid #fff; color: #fff; font-size: 0.85rem; padding: 0.4rem 1rem; border-radius: var(--radius-pill); text-decoration: none; }

        .progress-bar { height: 3px; background: #eee; }
        .progress-fill { height: 100%; background: var(--black); }

        .page { max-width: 560px; margin: 2.5rem auto; padding: 0 1.5rem; }

        .step-indicator { font-size: 0.72rem; color: #aaa; margin-bottom: 0.5rem; }

        .section-title {
            font-size: 0.72rem; font-weight: 700;
            letter-spacing: 0.12em; text-transform: uppercase;
            margin-bottom: 0.4rem;
        }
        .section-note { font-size: 0.75rem; color: #aaa; margin-bottom: 1.5rem; }

        /* Platform grid */
        .platforms-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            margin-bottom: 2rem;
        }

        /* Each platform is a pill with optional logo */
        .platform-pill {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.4rem 1rem 0.4rem 0.6rem;
            border: 1.5px solid #ccc;
            border-radius: var(--radius-pill);
            cursor: pointer;
            user-select: none;
            font-size: 0.82rem;
            font-weight: 500;
            transition: border-color 0.12s, background 0.12s;
            background: var(--white);
        }
        .platform-pill:hover { border-color: #888; }
        .platform-pill.selected {
            background: var(--black);
            border-color: var(--black);
            color: var(--white);
        }
        /* Logo container inside pill */
        .platform-logo {
            width: 22px; height: 22px;
            border-radius: 6px;
            display: flex; align-items: center; justify-content: center;
            flex-shrink: 0;
            overflow: hidden;
        }
        .platform-logo svg { width: 18px; height: 18px; }
        .platform-logo img { width: 100%; height: 100%; object-fit: contain; }

        /* Selected checkmark pill (top row) */
        .selected-pills { display: flex; flex-wrap: wrap; gap: 0.4rem; margin-bottom: 1rem; min-height: 36px; }
        .selected-pill-item {
            display: inline-flex; align-items: center; gap: 0.4rem;
            padding: 0.3rem 0.5rem 0.3rem 0.85rem;
            background: var(--black); color: white;
            border-radius: var(--radius-pill);
            font-size: 0.78rem; font-weight: 500;
        }
        .selected-pill-item .remove-btn {
            background: rgba(255,255,255,0.2); border: none; color: white;
            width: 18px; height: 18px; border-radius: 50%;
            cursor: pointer; display: flex; align-items: center; justify-content: center;
            font-size: 0.65rem; font-weight: 700; padding: 0;
        }
        .selected-pill-item .remove-btn:hover { background: rgba(255,255,255,0.35); }

        .btn-black {
            background: var(--black); color: #fff; border: none;
            padding: 0.7rem 2.5rem; border-radius: var(--radius-pill);
            font-size: 0.9rem; font-weight: 600; cursor: pointer;
        }
        .btn-black:hover { background: #333; }

        .actions { display: flex; align-items: center; gap: 1rem; }
        .btn-skip {
            background: transparent; border: none; color: #aaa;
            font-size: 0.85rem; cursor: pointer; text-decoration: underline;
            font-family: var(--font);
        }
        .btn-skip:hover { color: #666; }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
</head>
<body>

<nav>
    <div class="nav-left">
        <div class="nav-logo">V</div>
        <a th:href="@{/submit}" class="nav-link">Submit</a>
        <a th:href="@{/explore}" class="nav-link">Explore</a>
    </div>
    <div class="nav-right">
        <a th:href="@{/login}" class="btn-ghost">Sign in</a>
        <a th:href="@{/register}" class="btn-outline-nav">Sign up</a>
    </div>
</nav>

<div class="progress-bar">
    <div class="progress-fill"
         th:style="'width: ' + (${stepNumber} * 100 / ${totalSteps}) + '%'"></div>
</div>

<form th:action="@{/submit/made-with}" method="post" id="madeWithForm">
    <input type="hidden" th:name="appId" th:value="${app.id}"/>
    <div id="platformInputs"></div>

    <div class="page">
        <div class="step-indicator"
             th:text="'Step ' + ${stepNumber} + ' of ' + ${totalSteps}">Step N of N</div>

        <div class="section-title">Made With</div>
        <div class="section-note">(optional) — select all that apply</div>

        <!-- Selected pills at top -->
        <div class="selected-pills" id="selectedPills"></div>

        <!-- Platform options -->
        <div class="platforms-grid" id="platformsGrid">

            <!-- Lovable -->
            <label class="platform-pill" data-key="lovable"
                   th:classappend="${#lists.contains(selectedPlatforms, 'lovable')} ? ' selected' : ''">
                <span class="platform-logo" style="background:#ff4d8d;">
                    <svg viewBox="0 0 24 24" fill="white" xmlns="http://www.w3.org/2000/svg">
                        <path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/>
                    </svg>
                </span>
                <span>Lovable</span>
            </label>

            <!-- Replit -->
            <label class="platform-pill" data-key="replit"
                   th:classappend="${#lists.contains(selectedPlatforms, 'replit')} ? ' selected' : ''">
                <span class="platform-logo" style="background:#f26207;">
                    <svg viewBox="0 0 24 24" fill="white" xmlns="http://www.w3.org/2000/svg">
                        <path d="M3 3h8v6H3zM13 3h8v6h-8zM13 9h8v6h-8zM3 15h8v6H3zM13 15h8v6h-8z"/>
                    </svg>
                </span>
                <span>Replit</span>
            </label>

            <!-- Claude -->
            <label class="platform-pill" data-key="claude"
                   th:classappend="${#lists.contains(selectedPlatforms, 'claude')} ? ' selected' : ''">
                <span class="platform-logo" style="background:#d4a27f;">
                    <svg viewBox="0 0 24 24" fill="white" xmlns="http://www.w3.org/2000/svg">
                        <circle cx="12" cy="12" r="1.5"/>
                        <line x1="12" y1="2" x2="12" y2="7" stroke="white" stroke-width="2" stroke-linecap="round"/>
                        <line x1="12" y1="17" x2="12" y2="22" stroke="white" stroke-width="2" stroke-linecap="round"/>
                        <line x1="2" y1="12" x2="7" y2="12" stroke="white" stroke-width="2" stroke-linecap="round"/>
                        <line x1="17" y1="12" x2="22" y2="12" stroke="white" stroke-width="2" stroke-linecap="round"/>
                        <line x1="4.93" y1="4.93" x2="8.46" y2="8.46" stroke="white" stroke-width="2" stroke-linecap="round"/>
                        <line x1="15.54" y1="15.54" x2="19.07" y2="19.07" stroke="white" stroke-width="2" stroke-linecap="round"/>
                        <line x1="19.07" y1="4.93" x2="15.54" y2="8.46" stroke="white" stroke-width="2" stroke-linecap="round"/>
                        <line x1="8.46" y1="15.54" x2="4.93" y2="19.07" stroke="white" stroke-width="2" stroke-linecap="round"/>
                    </svg>
                </span>
                <span>Claude</span>
            </label>

            <!-- Base44 -->
            <label class="platform-pill" data-key="base44"
                   th:classappend="${#lists.contains(selectedPlatforms, 'base44')} ? ' selected' : ''">
                <span class="platform-logo" style="background:#1a1a2e;">
                    <svg viewBox="0 0 24 24" fill="white" xmlns="http://www.w3.org/2000/svg">
                        <rect x="3" y="3" width="7" height="7" rx="1"/>
                        <rect x="14" y="3" width="7" height="7" rx="1"/>
                        <rect x="3" y="14" width="7" height="7" rx="1"/>
                        <rect x="14" y="14" width="7" height="7" rx="1"/>
                    </svg>
                </span>
                <span>Base44</span>
            </label>

            <!-- bolt.new -->
            <label class="platform-pill" data-key="bolt"
                   th:classappend="${#lists.contains(selectedPlatforms, 'bolt')} ? ' selected' : ''">
                <span class="platform-logo" style="background:#111;">
                    <svg viewBox="0 0 24 24" fill="white" xmlns="http://www.w3.org/2000/svg">
                        <path d="M13 2L4.5 13.5H11L10 22L19.5 10.5H13L13 2Z"/>
                    </svg>
                </span>
                <span style="font-weight:700;">bolt<span style="color:#aaa;font-weight:400;">.new</span></span>
            </label>

            <!-- Hybrid -->
            <label class="platform-pill" data-key="hybrid"
                   th:classappend="${#lists.contains(selectedPlatforms, 'hybrid')} ? ' selected' : ''">
                <span>Hybrid (Human + AI)</span>
            </label>

            <!-- Human only -->
            <label class="platform-pill" data-key="human"
                   th:classappend="${#lists.contains(selectedPlatforms, 'human')} ? ' selected' : ''">
                <span>Human only</span>
            </label>

        </div>

        <div class="actions">
            <button type="submit" class="btn-black">Submit App</button>
            <button type="button" class="btn-skip" onclick="document.getElementById('madeWithForm').submit()">Skip</button>
        </div>
    </div>
</form>

<script th:inline="javascript">
    // Pre-populate from server
    const preSelected = /*[[${selectedPlatforms}]]*/ [];
    const PLATFORM_LABELS = {
        lovable: 'Lovable', replit: 'Replit', claude: 'Claude',
        base44: 'Base44', bolt: 'bolt.new', hybrid: 'Hybrid (Human + AI)', human: 'Human only'
    };

    let selected = new Set(preSelected);

    // Attach click handlers to all pill labels
    document.querySelectorAll('.platform-pill[data-key]').forEach(pill => {
        const key = pill.dataset.key;
        pill.addEventListener('click', (e) => {
            e.preventDefault(); // prevent label default
            if (selected.has(key)) {
                selected.delete(key);
                pill.classList.remove('selected');
            } else {
                selected.add(key);
                pill.classList.add('selected');
            }
            render();
        });
    });

    function render() {
        // Render selected pills at top
        const sp = document.getElementById('selectedPills');
        sp.innerHTML = '';
        selected.forEach(key => {
            const item = document.createElement('div');
            item.className = 'selected-pill-item';
            item.innerHTML = `${PLATFORM_LABELS[key] || key}
                <button type="button" class="remove-btn" data-key="${key}">✕</button>`;
            item.querySelector('.remove-btn').addEventListener('click', () => {
                selected.delete(key);
                const pill = document.querySelector(`.platform-pill[data-key="${key}"]`);
                if (pill) pill.classList.remove('selected');
                render();
            });
            sp.appendChild(item);
        });

        // Sync hidden inputs
        const container = document.getElementById('platformInputs');
        container.innerHTML = '';
        selected.forEach(key => {
            const inp = document.createElement('input');
            inp.type = 'hidden';
            inp.name = 'platforms';
            inp.value = key;
            container.appendChild(inp);
        });
    }

    render();
</script>

</body>
</html>
