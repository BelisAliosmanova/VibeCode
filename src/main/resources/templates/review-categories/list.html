<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Review Categories — Vibe</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --dark: #5a5a5a; --black: #111; --white: #fff;
            --border: #ddd; --danger: #e05c5c; --accent: #2563eb;
            --radius-pill: 50px; --font: 'Inter', system-ui, sans-serif;
        }
        body { font-family: var(--font); background: var(--white); color: var(--black); }

        nav { display: flex; align-items: center; justify-content: space-between; padding: 0.85rem 2rem; background: var(--dark); }
        .nav-left { display: flex; align-items: center; gap: 1.5rem; }
        .nav-logo { width: 32px; height: 32px; background: #222; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; font-weight: 800; font-size: 0.9rem; }
        .nav-link { color: #fff; text-decoration: none; font-size: 0.9rem; opacity: 0.9; }
        .nav-right { display: flex; align-items: center; gap: 1rem; }
        .btn-outline-nav { background: transparent; border: 1.5px solid #fff; color: #fff; font-size: 0.85rem; padding: 0.4rem 1rem; border-radius: var(--radius-pill); text-decoration: none; }

        .page { max-width: 820px; margin: 2.5rem auto; padding: 0 1.5rem; }
        .page-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 2rem; }
        .page-title { font-size: 1.4rem; font-weight: 700; }

        .btn-black { background: var(--black); color: #fff; border: none; padding: 0.6rem 1.4rem; border-radius: var(--radius-pill); font-size: 0.88rem; font-weight: 600; cursor: pointer; text-decoration: none; }
        .btn-black:hover { background: #333; }

        .hint { font-size: 0.78rem; color: #aaa; margin-bottom: 1rem; }

        .list { display: flex; flex-direction: column; gap: 0.5rem; }

        .row {
            display: flex; align-items: center; justify-content: space-between;
            padding: 0.85rem 1.25rem;
            border: 1.5px solid var(--border); border-radius: var(--radius-pill);
            transition: border-color 0.12s; gap: 0.75rem;
        }
        .row:hover { border-color: #bbb; }

        .row-left { display: flex; align-items: center; gap: 1rem; flex: 1; min-width: 0; }
        .position-badge { width: 24px; height: 24px; border-radius: 50%; background: #f0f0f0; display: flex; align-items: center; justify-content: center; font-size: 0.72rem; font-weight: 700; color: #888; flex-shrink: 0; }
        .row-name { font-size: 0.95rem; font-weight: 600; }
        .row-slug { font-size: 0.78rem; color: #aaa; }
        .sub-count { font-size: 0.72rem; color: #aaa; border: 1.5px solid #eee; padding: 0.15rem 0.55rem; border-radius: var(--radius-pill); }

        .row-actions { display: flex; align-items: center; gap: 0.5rem; flex-shrink: 0; }
        .btn-link { background: transparent; border: 1.5px solid var(--border); color: var(--black); font-size: 0.78rem; font-weight: 500; padding: 0.3rem 0.85rem; border-radius: var(--radius-pill); text-decoration: none; transition: border-color 0.12s; white-space: nowrap; }
        .btn-link:hover { border-color: var(--black); }
        .btn-del { background: transparent; border: 1.5px solid #eee; color: #ccc; font-size: 0.78rem; padding: 0.3rem 0.75rem; border-radius: var(--radius-pill); cursor: pointer; font-family: var(--font); transition: all 0.12s; }
        .btn-del:hover { border-color: var(--danger); color: var(--danger); }

        .empty { text-align: center; padding: 4rem 0; color: #bbb; font-size: 0.95rem; }
        .empty a { color: var(--black); font-weight: 600; text-decoration: none; }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
</head>
<body>

<nav th:replace="~{fragments/navbar :: navbar}"></nav>

<div class="page">
    <div class="page-header">
        <h1 class="page-title">Review Categories</h1>
        <a th:href="@{/review-categories/new}" class="btn-black">+ New Category</a>
    </div>

    <p class="hint">
        Define the review categories (e.g. <strong>Reliability</strong>, <strong>Video</strong>).
        Each category has sub-categories with 5-star ratings. The category score is the average of its sub-categories.
    </p>

    <div class="list">
        <div th:if="${#lists.isEmpty(categories)}" class="empty">
            No review categories yet. <a th:href="@{/review-categories/new}">Create your first →</a>
        </div>

        <div th:each="cat : ${categories}" class="row">
            <div class="row-left">
                <div class="position-badge" th:text="${cat.position}">0</div>
                <div>
                    <div class="row-name" th:text="${cat.name}">Category</div>
                    <div class="row-slug" th:text="'/' + ${cat.slug}">slug</div>
                </div>
                <span class="sub-count"
                      th:text="${#lists.size(cat.subCategories)} + ' sub-criteria'">0 sub-criteria</span>
            </div>
            <div class="row-actions">
                <a th:href="@{/review-categories/{id}/sub-categories(id=${cat.id})}" class="btn-link">Sub-criteria</a>
                <a th:href="@{/review-categories/{id}/edit(id=${cat.id})}" class="btn-link">Edit</a>
                <form th:action="@{/review-categories/{id}/delete(id=${cat.id})}" method="post" style="display:inline;">
                    <button type="submit" class="btn-del"
                            th:data-name="${cat.name}"
                            onclick="return confirm('Delete ' + this.dataset.name + '?')">Delete</button>
                </form>
            </div>
        </div>
    </div>
</div>

</body>
</html>
