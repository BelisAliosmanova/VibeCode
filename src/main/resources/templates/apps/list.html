<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Apps — Vibe Admin</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --dark: #5a5a5a; --black: #111; --white: #fff;
            --border: #ddd; --light: #f8f8f8;
            --danger: #e05c5c; --success: #2d9e6b;
            --radius-pill: 50px; --font: 'Inter', system-ui, sans-serif;
        }
        body { font-family: var(--font); background: var(--white); color: var(--black); }

        nav { display: flex; align-items: center; justify-content: space-between; padding: 0.85rem 2rem; background: var(--dark); }
        .nav-left { display: flex; align-items: center; gap: 1.5rem; }
        .nav-logo { width: 32px; height: 32px; background: #222; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; font-weight: 800; font-size: 0.9rem; }
        .nav-link { color: #fff; text-decoration: none; font-size: 0.9rem; opacity: 0.9; }
        .nav-right { display: flex; align-items: center; gap: 1rem; }
        .btn-outline-nav { background: transparent; border: 1.5px solid #fff; color: #fff; font-size: 0.85rem; padding: 0.4rem 1rem; border-radius: var(--radius-pill); text-decoration: none; }

        .page { max-width: 1000px; margin: 2.5rem auto; padding: 0 1.5rem; }

        .page-header { display: flex; align-items: center; margin-bottom: 2rem; gap: 0.6rem; }
        .page-title { font-size: 1.4rem; font-weight: 700; }
        .app-count { font-size: 0.85rem; color: #aaa; font-weight: 400; }

        .app-list { display: flex; flex-direction: column; gap: 0.75rem; }

        .app-card {
            border: 1.5px solid var(--border); border-radius: 16px;
            padding: 1.1rem 1.4rem; transition: border-color 0.12s;
        }
        .app-card:hover { border-color: #bbb; }

        .app-card-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 1rem; }

        .app-main { flex: 1; min-width: 0; }

        .app-name-row { display: flex; align-items: center; gap: 0.6rem; margin-bottom: 0.3rem; flex-wrap: wrap; }
        .app-name { font-size: 1rem; font-weight: 700; }
        .app-version { font-size: 0.72rem; color: #aaa; }

        .app-url { font-size: 0.8rem; color: #888; text-decoration: none; display: block; }
        .app-url:hover { color: var(--black); }

        .app-description { font-size: 0.83rem; color: #666; margin-top: 0.35rem; line-height: 1.5;
            display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }

        .app-meta { display: flex; align-items: center; gap: 0.5rem; margin-top: 0.65rem; flex-wrap: wrap; }
        .meta-item { font-size: 0.75rem; color: #888; }
        .meta-sep { color: #ddd; font-size: 0.75rem; }

        .badge {
            display: inline-flex; align-items: center;
            padding: 0.18rem 0.65rem; border-radius: var(--radius-pill);
            font-size: 0.7rem; font-weight: 700; border: 1.5px solid;
        }
        .badge-draft     { border-color: #ddd;   color: #aaa; }
        .badge-submitted { border-color: #93c5fd; color: #2563eb; background: #eff6ff; }
        .badge-approved  { border-color: #6ee7b7; color: var(--success); background: #f0fdf4; }
        .badge-rejected  { border-color: #fca5a5; color: var(--danger); background: #fef2f2; }
        .badge-public    { border-color: #ddd; color: #666; }
        .badge-private   { border-color: #ebebeb; color: #ccc; }

        .app-actions { display: flex; align-items: center; gap: 0.4rem; flex-shrink: 0; }

        .btn {
            background: transparent; border: 1.5px solid var(--border);
            color: var(--black); font-size: 0.78rem; font-weight: 500;
            padding: 0.3rem 0.85rem; border-radius: var(--radius-pill);
            text-decoration: none; cursor: pointer; font-family: var(--font);
            transition: border-color 0.12s, background 0.12s; white-space: nowrap;
        }
        .btn:hover { border-color: #aaa; }
        .btn-approve { border-color: #6ee7b7; color: var(--success); }
        .btn-approve:hover { background: #f0fdf4; }
        .btn-reject { border-color: #fca5a5; color: var(--danger); }
        .btn-reject:hover { background: #fef2f2; }
        .btn-del { border-color: #eee; color: #ccc; }
        .btn-del:hover { border-color: #fca5a5; color: var(--danger); background: #fef2f2; }

        .empty-state { text-align: center; padding: 4rem 0; color: #bbb; font-size: 0.95rem; }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
</head>
<body>

<nav>
    <div class="nav-left">
        <div class="nav-logo">V</div>
        <a th:href="@{/apps}" class="nav-link">Apps</a>
        <a th:href="@{/categories}" class="nav-link">Categories</a>
        <a th:href="@{/users}" class="nav-link">Users</a>
    </div>
    <div class="nav-right">
        <a th:href="@{/submit}" class="btn-outline-nav">Submit App</a>
    </div>
</nav>

<div class="page">

    <div class="page-header">
        <h1 class="page-title">Apps</h1>
        <span class="app-count" th:text="'(' + ${#lists.size(apps)} + ')'"></span>
    </div>

    <div class="app-list">

        <div th:if="${#lists.isEmpty(apps)}" class="empty-state">
            No apps submitted yet.
        </div>

        <div th:each="app : ${apps}" class="app-card">
            <div class="app-card-top">

                <div class="app-main">
                    <div class="app-name-row">
                        <span class="app-name" th:text="${app.name}">App Name</span>
                        <span class="app-version" th:text="'v' + ${app.version}">v1</span>

                        <span class="badge"
                              th:classappend="${app.status.name() == 'DRAFT'} ? ' badge-draft' :
                                             (${app.status.name() == 'SUBMITTED'} ? ' badge-submitted' :
                                             (${app.status.name() == 'APPROVED'} ? ' badge-approved' : ' badge-rejected'))"
                              th:text="${app.status}">DRAFT</span>

                        <span class="badge"
                              th:classappend="${app.visibility.name() == 'PUBLIC'} ? ' badge-public' : ' badge-private'"
                              th:text="${app.visibility}">PRIVATE</span>
                    </div>

                    <a th:if="${app.url != null}" th:href="${app.url}" th:text="${app.url}"
                       target="_blank" class="app-url"></a>

                    <p th:if="${app.description != null}" class="app-description"
                       th:text="${app.description}"></p>

                    <div class="app-meta">
                        <span class="meta-item" th:text="'👤 ' + ${app.owner.email}">owner</span>
                        <span class="meta-sep">·</span>
                        <span class="meta-item" th:text="'submitted ' + ${#temporals.format(app.createdAt, 'dd MMM yyyy')}">date</span>
                        <span class="meta-sep">·</span>
                        <span class="meta-item" th:text="'slug: /' + ${app.slug}">slug</span>
                        <th:block th:if="${app.publishedAt != null}">
                            <span class="meta-sep">·</span>
                            <span class="meta-item" th:text="'published ' + ${#temporals.format(app.publishedAt, 'dd MMM yyyy')}">published</span>
                        </th:block>
                    </div>
                </div>

                <div class="app-actions">
                    <a th:href="@{/apps/{id}(id=${app.id})}" class="btn">View</a>
                    <a th:href="@{/apps/{id}/edit(id=${app.id})}" class="btn">Edit</a>

                    <form th:if="${app.status.name() == 'SUBMITTED'}"
                          th:action="@{/apps/{id}/approve(id=${app.id})}" method="post" style="display:inline;">
                        <button type="submit" class="btn btn-approve">Approve</button>
                    </form>

                    <form th:if="${app.status.name() == 'SUBMITTED' or app.status.name() == 'APPROVED'}"
                          th:action="@{/apps/{id}/reject(id=${app.id})}" method="post" style="display:inline;">
                        <button type="submit" class="btn btn-reject">Reject</button>
                    </form>

                    <form th:action="@{/apps/{id}/delete(id=${app.id})}" method="post" style="display:inline;">
                        <button type="submit" class="btn btn-del"
                                th:data-name="${app.name}"
                                onclick="return confirm('Delete ' + this.dataset.name + '?')">Delete</button>
                    </form>
                </div>

            </div>
        </div>

    </div>
</div>

</body>
</html>
