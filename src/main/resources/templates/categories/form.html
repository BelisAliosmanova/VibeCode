<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8"/>
    <title>Category — Vibe</title>
</head>
<body>
<main class="main">
    <div class="breadcrumb">
        <a th:href="@{/categories}">Categories</a> /
        <span th:text="${category.id} != null ? 'Edit' : 'New'">Form</span>
    </div>

    <div class="page-header">
        <h1 class="page-title" th:text="${category.id} != null ? 'Edit Category' : 'New Category'">Category</h1>
    </div>

    <div class="card" style="max-width: 520px;">
        <form th:action="${category.id} != null ? @{/categories/{id}(id=${category.id})} : @{/categories}"
              th:object="${category}" method="post">

            <div class="form-group">
                <label for="name">Name</label>
                <input id="name" type="text" th:field="*{name}"
                       placeholder="e.g. Main Category, Features, Pricing" required/>
            </div>

            <div class="form-group">
                <label for="slug">Slug</label>
                <input id="slug" type="text" th:field="*{slug}"
                       placeholder="e.g. main-category, features, pricing" required/>
            </div>

            <div class="form-group">
                <label for="description">Description <span style="color:var(--muted); font-weight:400;">(shown to users)</span></label>
                <input id="description" type="text" th:field="*{description}"
                       placeholder="e.g. Choose the best category for your app"/>
            </div>

            <div style="display:grid; grid-template-columns:1fr 1fr; gap:1rem;">
                <div class="form-group">
                    <label for="maxSelected">Max Selections</label>
                    <input id="maxSelected" type="number" th:field="*{maxSelected}"
                           min="1" placeholder="Leave blank = unlimited"/>
                </div>
                <div class="form-group">
                    <label for="position">Position <span style="color:var(--muted); font-weight:400;">(order in submit flow)</span></label>
                    <input id="position" type="number" th:field="*{position}" min="0" placeholder="0"/>
                </div>
            </div>

            <div class="form-group">
                <label style="display:flex; align-items:center; gap:0.5rem; text-transform:none; letter-spacing:0; font-size:0.9rem; font-weight:500; color:var(--text);">
                    <input type="checkbox" th:field="*{visibility}" style="width:auto;"/>
                    Visible in submit flow
                </label>
            </div>

            <div class="form-group">
                <label style="display:flex; align-items:center; gap:0.5rem; text-transform:none; letter-spacing:0; font-size:0.9rem; font-weight:500; color:var(--text);">
                    <input type="checkbox" th:field="*{allowCustom}" style="width:auto;"/>
                    Allow users to add custom entries
                </label>
            </div>

            <div style="display:flex; gap:0.75rem; margin-top:1.5rem;">
                <button type="submit" class="btn btn-primary">
                    <span th:text="${category.id} != null ? 'Save Changes' : 'Create Category'">Submit</span>
                </button>
                <a th:href="@{/categories}" class="btn btn-secondary">Cancel</a>
            </div>
        </form>
    </div>
</main>
</body>
</html>
