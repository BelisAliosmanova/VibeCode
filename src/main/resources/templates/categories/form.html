<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title th:text="${category.id != null} ? 'Edit Category' : 'New Category'">Category — Vibe</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --dark: #5a5a5a; --black: #111; --white: #fff;
            --light: #f8f8f8; --border: #ddd;
            --radius-pill: 50px; --font: 'Inter', system-ui, sans-serif;
        }
        body { font-family: var(--font); background: var(--white); color: var(--black); }

        nav { display: flex; align-items: center; justify-content: space-between; padding: 0.85rem 2rem; background: var(--dark); }
        .nav-left { display: flex; align-items: center; gap: 1.5rem; }
        .nav-logo { width: 32px; height: 32px; background: #222; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; font-weight: 800; font-size: 0.9rem; }
        .nav-link { color: #fff; text-decoration: none; font-size: 0.9rem; opacity: 0.9; }
        .nav-right { display: flex; align-items: center; gap: 1rem; }
        .btn-outline-nav { background: transparent; border: 1.5px solid #fff; color: #fff; font-size: 0.85rem; padding: 0.4rem 1rem; border-radius: var(--radius-pill); text-decoration: none; }

        .page { max-width: 520px; margin: 2.5rem auto; padding: 0 1.5rem; }

        .breadcrumb { font-size: 0.8rem; color: #aaa; margin-bottom: 1.5rem; }
        .breadcrumb a { color: var(--black); text-decoration: none; }
        .breadcrumb a:hover { text-decoration: underline; }

        .page-title { font-size: 1.4rem; font-weight: 700; margin-bottom: 2rem; }

        .field { margin-bottom: 1.1rem; }
        .field label { display: block; font-size: 0.75rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em; color: #888; margin-bottom: 0.4rem; }
        .field input[type="text"],
        .field input[type="number"] {
            width: 100%; padding: 0.75rem 1.1rem;
            border: 1.5px solid var(--border); border-radius: var(--radius-pill);
            font-size: 0.9rem; font-family: var(--font); outline: none;
            transition: border-color 0.15s; color: var(--black); background: var(--white);
        }
        .field input:focus { border-color: var(--black); }
        .field input::placeholder { color: #bbb; }
        .field-hint { font-size: 0.75rem; color: #aaa; margin-top: 0.3rem; }

        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }

        .divider { border: none; border-top: 1px solid var(--border); margin: 1.5rem 0; }

        .check-section-title {
            font-size: 0.72rem; font-weight: 700; text-transform: uppercase;
            letter-spacing: 0.08em; color: #888; margin-bottom: 0.75rem;
        }

        .check-row { display: flex; align-items: flex-start; gap: 0.6rem; margin-bottom: 0.9rem; cursor: pointer; }
        .check-row input[type="checkbox"] { width: 16px; height: 16px; cursor: pointer; accent-color: var(--black); flex-shrink: 0; margin-top: 2px; }
        .check-row-text span { display: block; font-size: 0.9rem; color: var(--black); }
        .check-row-text small { font-size: 0.75rem; color: #aaa; margin-top: 1px; }

        .btn-row { display: flex; gap: 0.75rem; margin-top: 1.75rem; }
        .btn-black { background: var(--black); color: #fff; border: none; padding: 0.7rem 2.2rem; border-radius: var(--radius-pill); font-size: 0.9rem; font-weight: 600; cursor: pointer; }
        .btn-black:hover { background: #333; }
        .btn-cancel { background: transparent; color: #888; border: 1.5px solid var(--border); padding: 0.7rem 1.5rem; border-radius: var(--radius-pill); font-size: 0.9rem; cursor: pointer; text-decoration: none; }
        .btn-cancel:hover { border-color: #aaa; color: var(--black); }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
</head>
<body>

<nav>
    <div class="nav-left">
        <div class="nav-logo">V</div>
        <a th:href="@{/apps}" class="nav-link">Apps</a>
        <a th:href="@{/categories}" class="nav-link">Categories</a>
        <a th:href="@{/users}" class="nav-link">Users</a>
    </div>
    <div class="nav-right">
        <a th:href="@{/submit}" class="btn-outline-nav">Submit App</a>
    </div>
</nav>

<div class="page">

    <div class="breadcrumb">
        <a th:href="@{/categories}">Categories</a> /
        <span th:text="${category.id != null} ? 'Edit' : 'New'">New</span>
    </div>

    <h1 class="page-title" th:text="${category.id != null} ? 'Edit Category' : 'New Category'">
        New Category
    </h1>

    <form th:action="${category.id != null} ? @{/categories/{id}(id=${category.id})} : @{/categories}"
          th:object="${category}" method="post">

        <div class="field">
            <label for="name">Name</label>
            <input id="name" type="text" th:field="*{name}"
                   placeholder="e.g. Main Category, Features, Pricing" required/>
        </div>

        <div class="field">
            <label for="slug">Slug</label>
            <input id="slug" type="text" th:field="*{slug}"
                   placeholder="e.g. main-category, features, pricing" required/>
            <p class="field-hint">Auto-filled from name. Used internally.</p>
        </div>

        <div class="field">
            <label for="description">Description</label>
            <input id="description" type="text" th:field="*{description}"
                   placeholder="e.g. Choose the best category for your app"/>
            <p class="field-hint">Shown to users as a hint during submission.</p>
        </div>

        <div class="grid-2">
            <div class="field">
                <label for="maxSelected">Max Selections</label>
                <input id="maxSelected" type="number" th:field="*{maxSelected}" min="1" placeholder="blank = unlimited"/>
                <p class="field-hint">1 = single select (e.g. Pricing)</p>
            </div>
            <div class="field">
                <label for="position">Position</label>
                <input id="position" type="number" th:field="*{position}" min="0" placeholder="0"/>
                <p class="field-hint">Order in submit flow &amp; explore sidebar.</p>
            </div>
        </div>

        <hr class="divider"/>

        <div class="check-section-title">Visibility</div>

        <label class="check-row">
            <input type="checkbox" th:field="*{visibility}"/>
            <div class="check-row-text">
                <span>Show in submit flow</span>
                <small>Users see this category when submitting an app.</small>
            </div>
        </label>

        <label class="check-row">
            <input type="checkbox" th:field="*{filterVisible}"/>
            <div class="check-row-text">
                <span>Show as filter in Explore page</span>
                <small>Entries from this category appear as sidebar filters on the Explore page.</small>
            </div>
        </label>

        <label class="check-row">
            <input type="checkbox" th:field="*{allowCustom}"/>
            <div class="check-row-text">
                <span>Allow custom entries</span>
                <small>Users can type their own entries (good for Features, not Pricing).</small>
            </div>
        </label>

        <div class="btn-row">
            <button type="submit" class="btn-black"
                    th:text="${category.id != null} ? 'Save Changes' : 'Create Category'">
                Create Category
            </button>
            <a th:href="@{/categories}" class="btn-cancel">Cancel</a>
        </div>
    </form>
</div>

<script>
    const nameInput = document.getElementById('name');
    const slugInput = document.getElementById('slug');
    let slugTouched = slugInput.value.trim() !== '';

    slugInput.addEventListener('input', () => { slugTouched = true; });
    nameInput.addEventListener('input', () => {
        if (slugTouched) return;
        slugInput.value = nameInput.value
            .toLowerCase().trim()
            .replace(/[^a-z0-9]+/g, '-')
            .replace(/^-|-$/g, '');
    });
</script>

</body>
</html>
