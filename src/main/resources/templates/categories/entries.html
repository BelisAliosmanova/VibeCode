<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title th:text="${category.name} + ' — Entries'">Entries — Vibe</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --dark: #5a5a5a; --black: #111; --white: #fff;
            --border: #ddd; --danger: #e05c5c;
            --radius-pill: 50px; --font: 'Inter', system-ui, sans-serif;
        }
        body { font-family: var(--font); background: var(--white); color: var(--black); }

        nav { display: flex; align-items: center; justify-content: space-between; padding: 0.85rem 2rem; background: var(--dark); }
        .nav-left { display: flex; align-items: center; gap: 1.5rem; }
        .nav-logo { width: 32px; height: 32px; background: #222; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; font-weight: 800; font-size: 0.9rem; }
        .nav-link { color: #fff; text-decoration: none; font-size: 0.9rem; opacity: 0.9; }
        .nav-right { display: flex; align-items: center; gap: 1rem; }
        .btn-outline-nav { background: transparent; border: 1.5px solid #fff; color: #fff; font-size: 0.85rem; padding: 0.4rem 1rem; border-radius: var(--radius-pill); text-decoration: none; }

        .page { max-width: 860px; margin: 2.5rem auto; padding: 0 1.5rem; }

        .breadcrumb { font-size: 0.8rem; color: #aaa; margin-bottom: 1.5rem; }
        .breadcrumb a { color: var(--black); text-decoration: none; }
        .breadcrumb a:hover { text-decoration: underline; }

        .page-header { display: flex; align-items: baseline; gap: 0.75rem; margin-bottom: 2rem; }
        .page-title { font-size: 1.4rem; font-weight: 700; }
        .page-subtitle { font-size: 0.9rem; color: #aaa; }

        .layout { display: grid; grid-template-columns: 1fr 290px; gap: 2rem; align-items: start; }

        /* Entry pills list */
        .entries-list { display: flex; flex-wrap: wrap; gap: 0.5rem; }

        .entry-pill {
            display: inline-flex; align-items: center; gap: 0.5rem;
            padding: 0.35rem 0.85rem 0.35rem 1rem;
            border: 1.5px solid var(--border); border-radius: var(--radius-pill);
            background: var(--white); font-size: 0.82rem;
        }

        .entry-pill-name { font-weight: 500; }
        .entry-pill-interest { font-size: 0.72rem; color: #aaa; }

        .entry-pill-hidden { opacity: 0.45; }

        .btn-delete {
            background: transparent; border: none; color: #ccc;
            cursor: pointer; font-size: 0.8rem; padding: 0;
            line-height: 1; transition: color 0.12s;
        }
        .btn-delete:hover { color: var(--danger); }

        .empty-state { font-size: 0.88rem; color: #bbb; }

        /* Add form */
        .add-panel {
            border: 1.5px solid var(--border);
            border-radius: 16px;
            padding: 1.25rem;
            position: sticky;
            top: 1.5rem;
        }

        .add-panel-title { font-size: 0.72rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; color: #888; margin-bottom: 1.25rem; }

        .field { margin-bottom: 0.85rem; }
        .field label { display: block; font-size: 0.72rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em; color: #aaa; margin-bottom: 0.3rem; }
        .field input[type="text"],
        .field input[type="number"] {
            width: 100%; padding: 0.6rem 1rem;
            border: 1.5px solid var(--border); border-radius: var(--radius-pill);
            font-size: 0.88rem; font-family: var(--font); outline: none;
            transition: border-color 0.15s; color: var(--black); background: var(--white);
        }
        .field input:focus { border-color: var(--black); }
        .field input::placeholder { color: #ccc; }

        .check-row { display: flex; align-items: center; gap: 0.5rem; margin-bottom: 1rem; cursor: pointer; }
        .check-row input[type="checkbox"] { width: 15px; height: 15px; accent-color: var(--black); cursor: pointer; }
        .check-row span { font-size: 0.85rem; color: var(--black); }

        .btn-black { background: var(--black); color: #fff; border: none; padding: 0.65rem 0; border-radius: var(--radius-pill); font-size: 0.88rem; font-weight: 600; cursor: pointer; width: 100%; }
        .btn-black:hover { background: #333; }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
</head>
<body>

<nav>
    <div class="nav-left">
        <div class="nav-logo">V</div>
        <a th:href="@{/apps}" class="nav-link">Apps</a>
        <a th:href="@{/categories}" class="nav-link">Categories</a>
        <a th:href="@{/users}" class="nav-link">Users</a>
    </div>
    <div class="nav-right">
        <a th:href="@{/submit}" class="btn-outline-nav">Submit App</a>
    </div>
</nav>

<div class="page">

    <div class="breadcrumb">
        <a th:href="@{/categories}">Categories</a> /
        <span th:text="${category.name}">Category</span> /
        Entries
    </div>

    <div class="page-header">
        <h1 class="page-title" th:text="${category.name}">Category</h1>
        <span class="page-subtitle"
              th:text="${#lists.size(entries)} + ' entries'">0 entries</span>
    </div>

    <div class="layout">

        <!-- LEFT: existing entries as pills -->
        <div>
            <div class="entries-list">
                <p th:if="${#lists.isEmpty(entries)}" class="empty-state">
                    No entries yet — add one using the form.
                </p>

                <span th:each="entry : ${entries}"
                      class="entry-pill"
                      th:classappend="${!entry.visibility} ? ' entry-pill-hidden' : ''">
                    <span class="entry-pill-name" th:text="${entry.name}">Name</span>
                    <span class="entry-pill-interest" th:text="'↑' + ${entry.interest}">↑0</span>
                    <form th:action="@{/categories/{cId}/entries/{eId}/delete(cId=${category.id},eId=${entry.id})}"
                          method="post" style="display:inline; margin:0;">
                        <button type="submit" class="btn-delete"
                                th:data-name="${entry.name}"
                                onclick="return confirm('Delete ' + this.dataset.name + '?')">✕</button>
                    </form>
                </span>
            </div>
        </div>

        <!-- RIGHT: add entry form -->
        <div class="add-panel">
            <div class="add-panel-title">Add Entry</div>

            <form th:action="@{/categories/{id}/entries(id=${category.id})}"
                  method="post">

                <div class="field">
                    <label for="entryName">Name</label>
                    <input id="entryName" type="text" name="name"
                           placeholder="e.g. Marketing" required/>
                </div>

                <div class="field">
                    <label for="entrySlug">Slug</label>
                    <input id="entrySlug" type="text" name="slug"
                           placeholder="e.g. marketing" required/>
                </div>

                <div class="field">
                    <label for="entryInterest">Interest Score</label>
                    <input id="entryInterest" type="number" name="interest" min="0" placeholder="0"/>
                </div>

                <div class="field">
                    <label for="entryPosition">Position</label>
                    <input id="entryPosition" type="number" name="position" min="0" placeholder="0"/>
                </div>

                <label class="check-row">
                    <input type="checkbox" name="visibility" value="true" checked/>
                    <span>Visible</span>
                </label>

                <button type="submit" class="btn-black">Add Entry</button>
            </form>
        </div>

    </div>
</div>

<script>
    const nameInput = document.getElementById('entryName');
    const slugInput = document.getElementById('entrySlug');
    let slugTouched = false;

    slugInput.addEventListener('input', () => { slugTouched = true; });
    nameInput.addEventListener('input', () => {
        if (slugTouched) return;
        slugInput.value = nameInput.value
            .toLowerCase().trim()
            .replace(/[^a-z0-9]+/g, '-')
            .replace(/^-|-$/g, '');
    });
</script>

</body>
</html>
