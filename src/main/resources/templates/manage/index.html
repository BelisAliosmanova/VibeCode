<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title th:text="${app.name} + ' — Manage Listing'">Manage Listing</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --dark: #5a5a5a; --black: #111; --white: #fff;
            --border: #ddd; --light: #f8f8f8; --danger: #e05c5c;
            --radius-pill: 50px; --font: 'Inter', system-ui, sans-serif;
        }
        body { font-family: var(--font); background: var(--white); color: var(--black); font-size: 14px; }

        nav { display: flex; align-items: center; justify-content: space-between; padding: 0.7rem 1.5rem; background: var(--dark); }
        .nav-left { display: flex; align-items: center; gap: 1.25rem; }
        .nav-logo { width: 28px; height: 28px; background: #222; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; font-weight: 800; font-size: 0.8rem; }
        .nav-link { color: #fff; text-decoration: none; font-size: 0.85rem; opacity: 0.9; }
        .nav-right { display: flex; align-items: center; gap: 0.75rem; }
        .btn-ghost-nav { background: transparent; border: none; color: #fff; font-size: 0.82rem; cursor: pointer; text-decoration: none; }
        .btn-outline-nav { background: transparent; border: 1.5px solid #fff; color: #fff; font-size: 0.78rem; padding: 0.32rem 0.85rem; border-radius: var(--radius-pill); text-decoration: none; }

        .header-band { background: var(--dark); color: white; text-align: center; padding: 1.5rem; }
        .header-band h1 { font-size: 1.4rem; font-weight: 600; }

        .page { max-width: 850px; margin: 0 auto; padding: 1.75rem 1.5rem 4rem; }

        /* APP HEADER */
        .app-header-card { display: flex; align-items: flex-start; gap: 1rem; margin-bottom: 1.5rem; }
        .app-icon-wrap { width: 72px; height: 72px; flex-shrink: 0; border: 1.5px solid var(--border); border-radius: 16px; overflow: hidden; background: var(--light); display: flex; align-items: center; justify-content: center; position: relative; cursor: pointer; }
        .app-icon-wrap img { width: 100%; height: 100%; object-fit: cover; }
        .app-icon-placeholder { font-size: 1.6rem; color: #ccc; }
        .app-icon-overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.4); display: none; align-items: center; justify-content: center; color: white; font-size: 0.72rem; font-weight: 600; }
        .app-icon-wrap:hover .app-icon-overlay { display: flex; }
        .app-header-info { flex: 1; min-width: 0; }
        .app-name-edit { font-size: 1.15rem; font-weight: 700; outline: none; border-radius: 6px; padding: 2px 4px; margin-left: -4px; display: inline-block; min-width: 40px; }
        .app-name-edit:focus { background: #f5f5f5; }
        .app-desc-edit { font-size: 0.8rem; color: #666; line-height: 1.5; outline: none; border-radius: 6px; padding: 2px 4px; margin-left: -4px; display: block; min-height: 1.5em; margin-top: 0.15rem; }
        .app-desc-edit:focus { background: #f5f5f5; }
        .save-inline-badge { display: none; font-size: 0.7rem; color: #2d9e6b; font-weight: 600; margin-left: 6px; }
        .save-inline-badge.show { display: inline; }
        .pricing-badge { display: inline-flex; align-items: center; background: var(--black); color: #fff; border-radius: var(--radius-pill); padding: 0.18rem 0.75rem; font-size: 0.7rem; font-weight: 600; margin-right: 0.35rem; opacity: 0.4; }

        /* META ROWS */
        .meta-row { display: flex; align-items: center; gap: 0.5rem; padding: 0.7rem 0; border-top: 1px solid var(--border); flex-wrap: wrap; }
        .meta-label { font-size: 0.72rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; color: #888; min-width: 110px; }
        .stars { display: flex; gap: 2px; }
        .star { font-size: 0.9rem; color: #ddd; }
        .score-val { font-size: 0.82rem; font-weight: 700; }
        .score-label { font-size: 0.75rem; color: #aaa; }
        .btn-sm { display: inline-flex; align-items: center; padding: 0.3rem 0.9rem; border-radius: var(--radius-pill); font-size: 0.75rem; font-weight: 500; border: 1.5px solid var(--border); background: var(--white); color: var(--black); cursor: pointer; text-decoration: none; font-family: var(--font); white-space: nowrap; transition: border-color 0.12s; }
        .btn-sm:hover { border-color: #aaa; }
        .btn-sm-disabled { opacity: 0.4; cursor: default; }

        /* MEDIA */
        .media-strip { border: 1.5px solid var(--border); border-radius: 12px; overflow: hidden; margin-bottom: 1.5rem; background: var(--light); }
        .media-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1px; background: var(--border); }
        .media-cell { background: var(--light); aspect-ratio: 4/3; display: flex; align-items: center; justify-content: center; position: relative; overflow: hidden; cursor: pointer; }
        .media-cell img { width: 100%; height: 100%; object-fit: cover; }
        .play-btn { width: 36px; height: 36px; background: rgba(0,0,0,0.5); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; font-size: 1rem; }
        .media-placeholder { color: #ccc; font-size: 1.5rem; }
        .media-upload-overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.35); display: none; align-items: center; justify-content: center; color: white; font-size: 0.72rem; font-weight: 600; }
        .media-cell:hover .media-upload-overlay { display: flex; }
        .media-dots { display: flex; justify-content: center; gap: 4px; padding: 0.6rem; }
        .media-dot { width: 6px; height: 6px; border-radius: 50%; background: #ccc; }
        .media-dot.active { background: var(--black); }

        /* SECTIONS */
        .section { margin-bottom: 1.75rem; }
        .section-title { font-size: 0.7rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; color: #333; margin-bottom: 0.75rem; }
        .hint-text { font-size: 0.72rem; color: #aaa; margin-bottom: 0.6rem; }

        /* ── CATEGORY PILLS ─────────────────────────────────────────────── */
        .selected-row {
            display: flex; flex-wrap: wrap; gap: 0.4rem; align-items: center;
            margin-bottom: 0.5rem;
        }
        .sel-pill {
            display: inline-flex; align-items: center; gap: 0.3rem;
            padding: 0.28rem 0.5rem 0.28rem 0.75rem;
            background: var(--black); color: #fff;
            border: 1.5px solid var(--black);
            border-radius: var(--radius-pill);
            font-size: 0.73rem; font-weight: 600;
            text-transform: uppercase; letter-spacing: 0.04em;
            user-select: none;
        }
        .sel-pill img { width: 13px; height: 13px; object-fit: contain; border-radius: 2px; }
        .sel-pill-remove {
            width: 16px; height: 16px; border-radius: 50%;
            background: rgba(255,255,255,0.15); border: none;
            color: white; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            font-size: 0.55rem; padding: 0; flex-shrink: 0;
            opacity: 0; transition: opacity 0.12s, background 0.12s;
            font-family: var(--font);
        }
        .sel-pill:hover .sel-pill-remove { opacity: 1; }
        .sel-pill-remove:hover { background: rgba(255,255,255,0.3); }

        .pill-add-btn {
            width: 26px; height: 26px; border-radius: 50%;
            border: 1.5px solid #ccc; background: var(--white);
            cursor: pointer; display: flex; align-items: center; justify-content: center;
            font-size: 1rem; color: #888; line-height: 1;
            transition: border-color 0.12s, color 0.12s; flex-shrink: 0;
            font-family: var(--font);
        }
        .pill-add-btn:hover { border-color: var(--black); color: var(--black); }

        .pill-picker {
            display: none;
            background: var(--white);
            border: 1.5px solid var(--border);
            border-radius: 14px;
            padding: 0.85rem 1rem;
            margin-top: 0.5rem;
        }
        .pill-picker.open { display: block; }
        .picker-hint { font-size: 0.7rem; color: #aaa; margin-bottom: 0.6rem; }
        .picker-pills { display: flex; flex-wrap: wrap; gap: 0.4rem; margin-bottom: 0.85rem; }
        .opt-pill {
            display: inline-flex; align-items: center; gap: 0.3rem;
            padding: 0.28rem 0.75rem;
            border: 1.5px solid #ccc; border-radius: var(--radius-pill);
            font-size: 0.73rem; font-weight: 500;
            cursor: pointer; user-select: none;
            background: var(--white); color: var(--black);
            transition: border-color 0.12s, background 0.12s;
        }
        .opt-pill:hover { border-color: var(--black); }
        .opt-pill.selected { background: var(--black); color: #fff; border-color: var(--black); }
        .opt-pill.selected img { filter: brightness(0) invert(1); }
        .opt-pill img { width: 13px; height: 13px; object-fit: contain; border-radius: 2px; }
        .picker-actions { display: flex; align-items: center; gap: 0.6rem; }
        .btn-update { background: var(--black); color: #fff; border: none; padding: 0.4rem 1.35rem; border-radius: var(--radius-pill); font-size: 0.78rem; font-weight: 600; cursor: pointer; font-family: var(--font); transition: background 0.12s; }
        .btn-update:hover { background: #333; }
        .btn-update.saving { opacity: 0.6; }
        .btn-update.saved { background: #2d9e6b; }
        .btn-picker-cancel { background: transparent; border: none; color: #aaa; font-size: 0.78rem; cursor: pointer; font-family: var(--font); }
        .btn-picker-cancel:hover { color: var(--black); }

        /* ── WORKFLOWS ─────────────────────────────────────────────────────── */
        .workflows-container { border: 1.5px solid var(--border); border-radius: 14px; padding: 1.25rem 1.25rem 1rem; }
        .workflow-block { margin-bottom: 1.5rem; padding-bottom: 1.5rem; border-bottom: 1px solid var(--border); }
        .workflow-block:last-of-type { margin-bottom: 0; padding-bottom: 0; border-bottom: none; }
        .workflow-header { display: flex; align-items: center; gap: 0.5rem; margin-bottom: 0.8rem; }
        .workflow-label { font-size: 0.6rem; font-weight: 800; text-transform: uppercase; letter-spacing: 0.12em; color: #aaa; white-space: nowrap; }
        .workflow-title-input { border: none; border-bottom: 1.5px solid transparent; font-size: 0.85rem; font-weight: 700; color: var(--black); font-family: var(--font); outline: none; flex: 1; padding: 1px 2px; background: transparent; min-width: 0; transition: border-color 0.15s; }
        .workflow-title-input:hover { border-bottom-color: var(--border); }
        .workflow-title-input:focus { border-bottom-color: var(--black); }
        .workflow-delete-btn { background: none; border: none; color: #ccc; cursor: pointer; font-size: 0.75rem; padding: 2px 4px; transition: color 0.12s; flex-shrink: 0; }
        .workflow-delete-btn:hover { color: var(--danger); }

        /* Steps diagram */
        .steps-diagram { display: flex; align-items: center; flex-wrap: nowrap; overflow-x: auto; padding-bottom: 4px; gap: 0; }
        .steps-diagram::-webkit-scrollbar { height: 3px; }
        .steps-diagram::-webkit-scrollbar-thumb { background: #ddd; border-radius: 2px; }
        .step-arrow { color: #aaa; font-size: 0.82rem; flex-shrink: 0; line-height: 1; user-select: none; }

        /* Step box — editable */
        .step-box {
            flex-shrink: 0; border: 1.5px solid #888; border-radius: 999px;
            padding: 0.4rem 0.85rem; background: var(--white);
            min-width: 52px; max-width: 130px;
            display: flex; align-items: flex-start; gap: 0.3rem; position: relative;
            transition: border-color 0.15s;
        }
        .step-box.multiline { border-radius: 14px; }
        .step-box:hover { border-color: var(--black); }
        .step-box.editing { border-color: var(--black); border-style: solid; }

        .step-box-inner { min-width: 0; flex: 1; }
        .step-box-label { font-size: 0.55rem; font-weight: 800; text-transform: uppercase; letter-spacing: 0.08em; color: #aaa; margin-bottom: 2px; white-space: nowrap; }

        /* The editable text */
        .step-box-text {
            font-size: 0.72rem; color: var(--black); line-height: 1.35;
            word-break: break-word; outline: none; cursor: text;
            border-radius: 3px; transition: background 0.12s;
            min-width: 20px;
        }
        .step-box-text:focus { background: #f5f5f5; }

        /* Char counter — shown while editing */
        .step-char-counter {
            position: absolute; bottom: -16px; right: 4px;
            font-size: 0.58rem; color: #bbb;
            display: none; white-space: nowrap;
            pointer-events: none;
        }
        .step-char-counter.over { color: var(--danger); }
        .step-box.editing .step-char-counter { display: block; }

        .step-box-delete {
            position: absolute; top: -7px; right: -7px;
            width: 16px; height: 16px; border-radius: 50%;
            background: #ccc; border: none; color: white; cursor: pointer;
            font-size: 0.55rem; display: none; align-items: center; justify-content: center;
            line-height: 1; padding: 0; transition: background 0.12s;
        }
        .step-box:hover .step-box-delete { display: flex; }
        .step-box-delete:hover { background: var(--danger); }

        .add-step-circle { flex-shrink: 0; width: 32px; height: 32px; border-radius: 50%; border: 1.5px solid #aaa; background: var(--white); display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 1.1rem; color: #888; transition: border-color 0.15s, color 0.15s; font-family: var(--font); }
        .add-step-circle:hover { border-color: var(--black); color: var(--black); }

        .add-workflow-row { padding-top: 0.85rem; border-top: 1px solid var(--border); margin-top: 0.5rem; }
        .add-workflow-btn { background: none; border: none; font-family: var(--font); font-size: 0.75rem; font-weight: 700; color: #000000ad; cursor: pointer; padding: 0; display: flex; align-items: center; gap: 0.25rem; transition: color 0.12s; letter-spacing: 0.06em; text-transform: uppercase; }
        .add-workflow-btn:hover { color: #2563eb; }

        .divider { border: none; border-top: 1px solid var(--border); margin: 1.5rem 0; }

        /* TOAST */
        .toast { position: fixed; bottom: 1.5rem; left: 50%; transform: translateX(-50%) translateY(20px); background: var(--black); color: #fff; padding: 0.55rem 1.25rem; border-radius: var(--radius-pill); font-size: 0.82rem; font-weight: 500; opacity: 0; transition: opacity 0.2s, transform 0.2s; pointer-events: none; z-index: 999; white-space: nowrap; }
        .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
        .toast.error { background: var(--danger); }

        /* MODALS */
        .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 1000; align-items: center; justify-content: center; }
        .modal-overlay.open { display: flex; }
        .modal { background: var(--white); border-radius: 18px; padding: 1.75rem; width: 420px; max-width: 90vw; box-shadow: 0 8px 40px rgba(0,0,0,0.15); }
        .modal-title { font-size: 1rem; font-weight: 700; margin-bottom: 1.25rem; }
        .modal-field { margin-bottom: 1rem; }
        .modal-field label { display: block; font-size: 0.72rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em; color: #aaa; margin-bottom: 0.3rem; }
        .modal-field input { width: 100%; padding: 0.6rem 1rem; border: 1.5px solid var(--border); border-radius: 10px; font-size: 0.88rem; font-family: var(--font); outline: none; transition: border-color 0.15s; color: var(--black); }
        .modal-field input:focus { border-color: var(--black); }
        .modal-char-hint { font-size: 0.72rem; color: #aaa; margin-top: 0.3rem; text-align: right; }
        .modal-char-hint.over { color: var(--danger); }
        .modal-actions { display: flex; gap: 0.75rem; justify-content: flex-end; margin-top: 1.25rem; }
        .btn-modal-cancel { background: transparent; border: 1.5px solid var(--border); color: #888; padding: 0.5rem 1.25rem; border-radius: var(--radius-pill); font-size: 0.82rem; cursor: pointer; font-family: var(--font); }
        .btn-modal-submit { background: var(--black); color: #fff; border: none; padding: 0.5rem 1.5rem; border-radius: var(--radius-pill); font-size: 0.82rem; font-weight: 600; cursor: pointer; font-family: var(--font); }
        .btn-modal-submit:hover { background: #333; }
        .btn-modal-submit:disabled { opacity: 0.4; cursor: not-allowed; }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
</head>
<body>

<nav th:replace="~{fragments/navbar :: navbar}"></nav>
<div class="header-band"><h1>Manage your listing</h1></div>

<div class="toast" id="toast"></div>

<div class="page">

    <!-- APP HEADER -->
    <div class="app-header-card">
        <div class="app-icon-wrap" id="iconWrap" onclick="document.getElementById('iconFileInput').click()">
            <img alt="icon" id="iconImg" th:if="${app.iconUrl != null}" th:src="${app.iconUrl}"/>
            <span class="app-icon-placeholder" id="iconPlaceholder" th:if="${app.iconUrl == null}">🖼</span>
            <div class="app-icon-overlay">Upload</div>
        </div>
        <input accept="image/*" id="iconFileInput" style="display:none;" type="file"/>

        <div class="app-header-info">
            <div>
                <span class="app-name-edit" contenteditable="true" id="editableName"
                      th:text="${app.name}"></span>
                <span class="save-inline-badge" id="saveBadge">✓ Saved</span>
            </div>
            <span class="app-desc-edit" contenteditable="true" id="editableDescription"
                  th:text="${app.description != null ? app.description : 'Add a description...'}"></span>
            <div style="display:flex;gap:0.4rem;align-items:center;margin-top:0.45rem;flex-wrap:wrap;">
                <span class="pricing-badge">PRICING</span>
                <button class="btn-sm" onclick="saveAppInfo()" style="margin-left:auto;">Save changes</button>
            </div>
        </div>
    </div>

    <!-- RATING -->
    <div class="meta-row">
        <span class="meta-label">RATING</span>
        <div style="display:flex;gap:2px;">
            <span th:each="i : ${#numbers.sequence(1,5)}"
            th:style="${certifiedAvg >= i} ? 'font-size:0.9rem;color:#000000ad;' : 'font-size:0.9rem;color:#ddd;'">★</span>
        </div>
        <span class="score-label"
              th:text="${#numbers.formatDecimal(certifiedAvg,1,1)} + '/5'">0/5</span>
        <div style="display:flex;align-items:center;gap:0.6rem;margin-bottom:0.75rem;flex-wrap:wrap;">
            <a th:href="@{/apps/{id}/reviews(id=${app.id})}"
               style="font-size:0.72rem;color:#2563eb;border:1.5px solid #93c5fd;padding:0.18rem 0.65rem;border-radius:50px;background:#eff6ff;text-decoration:none;margin-left:400px;">
                Edit reviews
            </a>
        </div>
    </div>
    <div th:if="${visibleReviews != null and !#lists.isEmpty(visibleReviews)}"
         style="margin-bottom:1.75rem;">
        <div style="display:flex;gap:0.45rem;flex-wrap:wrap;">
            <div th:each="rev : ${visibleReviews}"
                 style="display:flex;flex-direction:column;align-items:center;padding:0.45rem 0.75rem;border:1.5px solid #ddd;border-radius:10px;min-width:70px;text-align:center;gap:0.2rem;background:#fafafa;">
            <span style="font-size:0.55rem;font-weight:800;text-transform:uppercase;letter-spacing:0.07em;color:#aaa;"
                  th:text="${rev.reviewCategory.name}"></span>
                <div style="display:flex;gap:1px;">
                <span th:each="i : ${#numbers.sequence(1,5)}"
                      th:style="${rev.score != null and rev.score >= i} ? 'font-size:0.68rem;color:#000000ad;' : 'font-size:0.68rem;color:#ddd;'">★</span>
                </div>
            </div>
        </div>
    </div>

    <!-- MEDIA -->
    <div class="media-strip">
        <div class="media-grid">
            <div class="media-cell" onclick="triggerMediaUpload('video')">
                <th:block th:with="vm=${media.?[type.name()=='VIDEO']}">
                    <img alt="" id="videoImg" th:if="${!vm.empty}" th:src="${vm[0].url}"/>
                    <div class="play-btn" th:if="${vm.empty}">▶</div>
                </th:block>
                <div class="media-upload-overlay">Upload Video</div>
            </div>
            <th:block th:with="ss=${media.?[type.name()=='SCREENSHOT']}">
                <div class="media-cell" onclick="triggerMediaUpload('shot1')">
                    <img alt="" id="shot1Img" th:if="${ss.size()>0}" th:src="${ss[0].url}"/>
                    <span class="media-placeholder" th:if="${ss.size()==0}">🖼</span>
                    <div class="media-upload-overlay">Upload</div>
                </div>
                <div class="media-cell" onclick="triggerMediaUpload('shot2')">
                    <img alt="" id="shot2Img" th:if="${ss.size()>1}" th:src="${ss[1].url}"/>
                    <span class="media-placeholder" th:if="${ss.size()<=1}">🖼</span>
                    <div class="media-upload-overlay">Upload</div>
                </div>
            </th:block>
        </div>
        <div class="media-dots">
            <div class="media-dot active"></div>
            <div class="media-dot"></div>
            <div class="media-dot"></div>
        </div>
    </div>
    <input accept="image/*,video/*" id="mediaFileInput" style="display:none;" type="file"/>

    <!-- CATEGORIES -->
    <th:block th:each="ce : ${categorySelections.entrySet()}">
        <div class="section" th:id="'section-' + ${ce.key.id}">
            <div class="section-title" th:text="${ce.key.name}">CATEGORY</div>
            <div class="hint-text"
                 th:if="${ce.key.description != null and !ce.key.description.isEmpty()}"
                 th:text="${ce.key.description}"></div>

            <div class="selected-row" th:id="'sel-row-' + ${ce.key.id}">
                <th:block th:each="entry : ${allEntries.get(ce.key.id)}">
                    <span th:if="${ce.value.contains(entry)}"
                          class="sel-pill"
                          th:data-entry-id="${entry.id}"
                          th:data-category-id="${ce.key.id}">
                        <img th:if="${entry.iconUrl != null}"
                             th:src="${entry.iconUrl}" th:alt="${entry.name}"/>
                        <span th:text="${entry.name}">Entry</span>
                        <button class="sel-pill-remove"
                                onclick="removePill(this.closest('.sel-pill'))"
                                type="button">✕</button>
                    </span>
                </th:block>
                <button class="pill-add-btn" type="button"
                        th:data-category-id="${ce.key.id}"
                        onclick="togglePicker(this)">+</button>
            </div>

            <div class="pill-picker" th:id="'picker-' + ${ce.key.id}">
                <div class="picker-hint"
                     th:text="${ce.key.maxSelected != null} ? 'Select up to ' + ${ce.key.maxSelected} + ' (' + ${#lists.size(ce.value)} + '/' + ${ce.key.maxSelected} + ' left)' : 'Click below to add or remove'">
                </div>
                <div class="picker-pills" th:id="'picker-pills-' + ${ce.key.id}">
                    <th:block th:each="entry : ${allEntries.get(ce.key.id)}">
                        <span class="opt-pill"
                              th:classappend="${ce.value.contains(entry)} ? ' selected' : ''"
                              th:data-entry-id="${entry.id}"
                              th:data-entry-name="${entry.name}"
                              th:data-entry-icon="${entry.iconUrl}"
                              th:data-category-id="${ce.key.id}"
                              th:data-max="${ce.key.maxSelected}"
                              onclick="toggleOptPill(this)">
                            <img th:if="${entry.iconUrl != null}"
                                 th:src="${entry.iconUrl}" th:alt="${entry.name}"/>
                            <span th:text="${entry.name}">Entry</span>
                        </span>
                    </th:block>
                </div>
                <div class="picker-actions">
                    <button class="btn-update"
                            type="button"
                            th:data-category-id="${ce.key.id}"
                            onclick="saveCategorySelections(this.dataset.categoryId, this)">
                        Update
                    </button>
                    <button class="btn-picker-cancel" type="button"
                            th:data-category-id="${ce.key.id}"
                            onclick="closePicker(this.dataset.categoryId)">
                        Cancel
                    </button>
                </div>
            </div>
        </div>
    </th:block>

    <hr class="divider"/>

    <!-- WORKFLOWS -->
    <div class="section">
        <div class="section-title">MAIN WORKFLOWS</div>
        <div class="workflows-container" id="workflowsContainer">
            <div id="workflowsList">
                <th:block th:each="wf : ${workflows}">
                    <div class="workflow-block" th:data-wf-id="${wf.id}" th:id="'wf-' + ${wf.id}">
                        <div class="workflow-header">
                            <span class="workflow-label">WORKFLOW NAME</span>
                            <input class="workflow-title-input"
                                   onblur="saveWorkflowTitle(this.dataset.id, this.value)"
                                   placeholder="Workflow name"
                                   th:data-id="${wf.id}"
                                   th:id="'wfTitle-' + ${wf.id}"
                                   th:value="${wf.title}"
                                   type="text"/>
                            <button class="workflow-delete-btn"
                                    onclick="deleteWorkflow(this.dataset.id)"
                                    th:data-id="${wf.id}">✕</button>
                        </div>
                        <div class="steps-diagram" th:id="'steps-' + ${wf.id}">
                            <th:block th:each="step, stat : ${workflowSteps.get(wf.id)}">
                                <span class="step-arrow" th:if="${!stat.first}">→</span>
                                <div class="step-box" th:id="'step-' + ${step.id}">
                                    <div class="step-box-inner">
                                        <div class="step-box-label">STEP <span th:text="${stat.index + 1}"></span></div>
                                        <div class="step-box-text"
                                             contenteditable="true"
                                             th:data-step-id="${step.id}"
                                             th:data-wf-id="${wf.id}"
                                             th:data-original="${step.text}"
                                             th:text="${step.text}"
                                             onkeydown="handleStepKeydown(event, this)"
                                             oninput="handleStepInput(this)"
                                             onfocus="handleStepFocus(this)"
                                             onblur="handleStepBlur(this)"></div>
                                    </div>
                                    <span class="step-char-counter">0/70</span>
                                    <button class="step-box-delete"
                                            onclick="deleteStep(this.dataset.wfId, this.dataset.stepId)"
                                            th:data-step-id="${step.id}"
                                            th:data-wf-id="${wf.id}">✕</button>
                                </div>
                            </th:block>
                            <span class="step-arrow"
                                  th:if="${workflowSteps.get(wf.id) != null and !workflowSteps.get(wf.id).empty}">→</span>
                            <button class="add-step-circle"
                                    onclick="openAddStepModal(this.dataset.wfId)"
                                    th:data-wf-id="${wf.id}">+</button>
                        </div>
                    </div>
                </th:block>
            </div>
            <div class="add-workflow-row">
                <button class="add-workflow-btn" onclick="openAddWorkflowModal()">+ ADD NEW WORKFLOW</button>
            </div>
        </div>
    </div>

</div>

<!-- ADD WORKFLOW MODAL -->
<div class="modal-overlay" id="addWorkflowModal">
    <div class="modal">
        <div class="modal-title">Add New Workflow</div>
        <div class="modal-field">
            <label>Workflow Name</label>
            <input autocomplete="off" id="newWorkflowTitle" placeholder="e.g. User Onboarding" type="text"/>
        </div>
        <div class="modal-actions">
            <button class="btn-modal-cancel" onclick="closeModal('addWorkflowModal')">Cancel</button>
            <button class="btn-modal-submit" onclick="createWorkflow()">Add Workflow</button>
        </div>
    </div>
</div>

<!-- ADD STEP MODAL -->
<div class="modal-overlay" id="addStepModal">
    <div class="modal">
        <div class="modal-title">Add Step</div>
        <div class="modal-field">
            <label>Step Description</label>
            <input autocomplete="off" id="newStepText" placeholder="e.g. User signs up with email"
                   type="text" maxlength="70" oninput="updateStepCharHint(this)"/>
            <div class="modal-char-hint" id="stepCharHint">0 / 70</div>
        </div>
        <div class="modal-actions">
            <button class="btn-modal-cancel" onclick="closeModal('addStepModal')">Cancel</button>
            <button class="btn-modal-submit" id="addStepSubmitBtn" onclick="createStep()">Add Step</button>
        </div>
    </div>
</div>

<script th:inline="javascript">
    const APP_ID = /*[[${app.id.toString()}]]*/ '';
    const STEP_MAX = 70;

    // ─── TOAST ──────────────────────────────────────────────────────────────
    function showToast(msg, err = false) {
        const t = document.getElementById('toast');
        t.textContent = msg;
        t.className = 'toast' + (err ? ' error' : '');
        t.classList.add('show');
        setTimeout(() => t.classList.remove('show'), 2500);
    }

    // ─── MODAL helpers ──────────────────────────────────────────────────────
    function openModal(id) { document.getElementById(id).classList.add('open'); }
    function closeModal(id) { document.getElementById(id).classList.remove('open'); }

    document.querySelectorAll('.modal-overlay').forEach(o =>
        o.addEventListener('click', e => { if (e.target === o) o.classList.remove('open'); }));

    document.addEventListener('keydown', e => {
        if (e.key === 'Escape') {
            document.querySelectorAll('.modal-overlay.open').forEach(m => m.classList.remove('open'));
        }
        if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
            if (document.getElementById('addStepModal').classList.contains('open')) createStep();
            else if (document.getElementById('addWorkflowModal').classList.contains('open')) createWorkflow();
        }
    });

    // ─── ICON UPLOAD ────────────────────────────────────────────────────────
    document.getElementById('iconFileInput').addEventListener('change', async function () {
        const file = this.files[0]; if (!file) return;
        const fd = new FormData(); fd.append('file', file);
        try {
            const r = await fetch(`/media/upload/icon/${APP_ID}`, { method: 'POST', body: fd });
            const d = await r.json();
            if (!r.ok) throw new Error(d.error || 'Upload failed');
            let img = document.getElementById('iconImg');
            if (!img) {
                img = document.createElement('img'); img.id = 'iconImg'; img.alt = 'icon';
                document.getElementById('iconPlaceholder')?.remove();
                document.getElementById('iconWrap').prepend(img);
            }
            img.src = d.url; showToast('Icon updated');
        } catch (e) { showToast(e.message, true); }
        this.value = '';
    });

    // ─── MEDIA UPLOAD ───────────────────────────────────────────────────────
    let _mediaSlot = 'shot1';
    function triggerMediaUpload(slot) { _mediaSlot = slot; document.getElementById('mediaFileInput').click(); }
    document.getElementById('mediaFileInput').addEventListener('change', async function () {
        const file = this.files[0]; if (!file) return;
        const fd = new FormData(); fd.append('file', file); fd.append('position', _mediaSlot === 'shot2' ? 1 : 0);
        try {
            const r = await fetch(`/media/upload/screenshot/${APP_ID}`, { method: 'POST', body: fd });
            const d = await r.json();
            if (!r.ok) throw new Error(d.error || 'Upload failed');
            const imgId = _mediaSlot === 'video' ? 'videoImg' : _mediaSlot === 'shot2' ? 'shot2Img' : 'shot1Img';
            let img = document.getElementById(imgId);
            if (!img) {
                const cell = document.querySelector(`[onclick="triggerMediaUpload('${_mediaSlot}')"]`);
                cell.querySelector('.media-placeholder, .play-btn')?.remove();
                img = document.createElement('img'); img.id = imgId; img.alt = ''; cell.prepend(img);
            }
            img.src = d.url; showToast('Media uploaded');
        } catch (e) { showToast(e.message, true); }
        this.value = '';
    });

    // ─── APP INFO ───────────────────────────────────────────────────────────
    async function saveAppInfo() {
        const name = document.getElementById('editableName').innerText.trim();
        const desc = document.getElementById('editableDescription').innerText.trim();
        if (!name) return showToast('Name cannot be empty', true);
        const fd = new FormData(); fd.append('name', name); fd.append('description', desc);
        try {
            const r = await fetch(`/apps/${APP_ID}/manage/info`, { method: 'POST', body: fd });
            const text = await r.text();
            if (!r.ok) {
                let msg = `HTTP ${r.status}`;
                try { msg = JSON.parse(text).error || msg; } catch (_) { msg = text.substring(0, 120) || msg; }
                throw new Error(msg);
            }
            const b = document.getElementById('saveBadge');
            b.classList.add('show'); setTimeout(() => b.classList.remove('show'), 2000);
            showToast('Saved');
        } catch (e) { showToast(e.message, true); }
    }

    // ─── SHARED fetch helper ─────────────────────────────────────────────────
    async function apiFetch(url, fd) {
        const r = await fetch(url, { method: 'POST', body: fd });
        const text = await r.text();
        let json;
        try { json = JSON.parse(text); } catch (_) {
            if (!r.ok) throw new Error(`HTTP ${r.status}: ${text.substring(0, 150)}`);
            return {};
        }
        if (!r.ok) throw new Error(json.error || `HTTP ${r.status}`);
        return json;
    }

    // ─── CATEGORY PILLS ─────────────────────────────────────────────────────
    function togglePicker(btn) {
        const catId = btn.dataset.categoryId;
        const picker = document.getElementById('picker-' + catId);
        picker.classList.toggle('open');
    }

    function closePicker(catId) {
        document.getElementById('picker-' + catId).classList.remove('open');
    }

    function toggleOptPill(pill) {
        const catId = pill.dataset.categoryId;
        const max = pill.dataset.max ? parseInt(pill.dataset.max) : null;
        const pickerPills = document.getElementById('picker-pills-' + catId);

        if (pill.classList.contains('selected')) {
            pill.classList.remove('selected');
            const selRow = document.getElementById('sel-row-' + catId);
            selRow.querySelector(`.sel-pill[data-entry-id="${pill.dataset.entryId}"]`)?.remove();
        } else {
            if (max === 1) {
                pickerPills.querySelectorAll('.opt-pill.selected')
                    .forEach(p => {
                        p.classList.remove('selected');
                        const selRow = document.getElementById('sel-row-' + catId);
                        selRow.querySelector(`.sel-pill[data-entry-id="${p.dataset.entryId}"]`)?.remove();
                    });
            } else if (max) {
                const currentCount = pickerPills.querySelectorAll('.opt-pill.selected').length;
                if (currentCount >= max) return;
            }
            pill.classList.add('selected');
            const selRow = document.getElementById('sel-row-' + catId);
            const addBtn = selRow.querySelector('.pill-add-btn');
            const newPill = buildSelPill(
                pill.dataset.entryId, catId,
                pill.dataset.entryName, pill.dataset.entryIcon
            );
            selRow.insertBefore(newPill, addBtn);
        }
    }

    function removePill(pill) {
        const entryId = pill.dataset.entryId;
        const catId = pill.dataset.categoryId;
        const optPill = document.querySelector(`#picker-pills-${catId} .opt-pill[data-entry-id="${entryId}"]`);
        if (optPill) optPill.classList.remove('selected');
        pill.remove();
    }

    async function saveCategorySelections(categoryId, btn) {
        const pickerPills = document.getElementById('picker-pills-' + categoryId);
        const selectedOptPills = [...pickerPills.querySelectorAll('.opt-pill.selected')];
        const ids = selectedOptPills.map(p => p.dataset.entryId);

        const selRow = document.getElementById('sel-row-' + categoryId);
        const addBtn = selRow.querySelector('.pill-add-btn');
        selRow.querySelectorAll('.sel-pill').forEach(p => p.remove());
        selectedOptPills.forEach(optPill => {
            const pill = buildSelPill(optPill.dataset.entryId, categoryId, optPill.dataset.entryName, optPill.dataset.entryIcon);
            selRow.insertBefore(pill, addBtn);
        });

        btn.textContent = 'Saving…'; btn.classList.add('saving');
        const fd = new FormData(); ids.forEach(id => fd.append('entryIds', id));
        try {
            await apiFetch(`/apps/${APP_ID}/manage/categories/${categoryId}`, fd);
            btn.textContent = 'Update'; btn.classList.remove('saving'); btn.classList.add('saved');
            setTimeout(() => btn.classList.remove('saved'), 1500);
            closePicker(categoryId);
            showToast('Updated');
        } catch (e) {
            btn.textContent = 'Update'; btn.classList.remove('saving');
            showToast(e.message, true);
        }
    }

    function buildSelPill(entryId, catId, name, iconUrl) {
        const span = document.createElement('span');
        span.className = 'sel-pill';
        span.dataset.entryId = entryId;
        span.dataset.categoryId = catId;
        if (iconUrl && iconUrl !== 'null') {
            const img = document.createElement('img'); img.src = iconUrl; img.alt = name;
            span.appendChild(img);
        }
        const label = document.createElement('span'); label.textContent = name;
        span.appendChild(label);
        const removeBtn = document.createElement('button');
        removeBtn.className = 'sel-pill-remove'; removeBtn.type = 'button'; removeBtn.textContent = '✕';
        removeBtn.onclick = () => {
            const optPill = document.querySelector(`#picker-pills-${catId} .opt-pill[data-entry-id="${entryId}"]`);
            if (optPill) optPill.classList.remove('selected');
            span.remove();
        };
        span.appendChild(removeBtn);
        return span;
    }

    function openAddWorkflowModal() {
        document.getElementById('newWorkflowTitle').value = '';
        openModal('addWorkflowModal');
        setTimeout(() => document.getElementById('newWorkflowTitle').focus(), 80);
    }

    async function createWorkflow() {
        const title = document.getElementById('newWorkflowTitle').value.trim();
        if (!title) return;
        const fd = new FormData(); fd.append('title', title);
        try {
            const data = await apiFetch(`/apps/${APP_ID}/manage/workflows`, fd);
            closeModal('addWorkflowModal');
            appendWorkflowBlock(data.id, data.title);
            showToast('Workflow added');
        } catch (e) { showToast(e.message, true); }
    }

    async function deleteWorkflow(wfId) {
        if (!confirm('Delete this workflow?')) return;
        try {
            await apiFetch(`/apps/${APP_ID}/manage/workflows/${wfId}/delete`, new FormData());
            document.getElementById('wf-' + wfId)?.remove();
            showToast('Deleted');
        } catch (e) { showToast(e.message, true); }
    }

    async function saveWorkflowTitle(wfId, value) {
        const title = value.trim(); if (!title) return;
        const fd = new FormData(); fd.append('title', title);
        try {
            await apiFetch(`/apps/${APP_ID}/manage/workflows/${wfId}/update`, fd);
            showToast('Saved');
        } catch (e) { showToast(e.message, true); }
    }

    function handleStepFocus(el) {
        const box = el.closest('.step-box');
        box.classList.add('editing');
        el.dataset.original = el.textContent.trim();
        updateStepCounter(el);
    }

    function handleStepInput(el) {
        const text = el.textContent;
        updateStepCounter(el);
        if (text.length > STEP_MAX) {
            el.textContent = text.substring(0, STEP_MAX);
            placeCursorAtEnd(el);
        }
        applyMultilineClass(el.closest('.step-box'));
    }

    function handleStepKeydown(event, el) {
        if (event.key === 'Enter') {
            event.preventDefault();
            el.blur();
        }
        if (event.key === 'Escape') {
            event.preventDefault();
            el.textContent = el.dataset.original || '';
            el.blur();
        }
    }

    async function handleStepBlur(el) {
        const box = el.closest('.step-box');
        box.classList.remove('editing');

        const newText = el.textContent.trim();
        const original = el.dataset.original || '';

        if (newText === original) return;

        if (!newText) {
            el.textContent = original;
            showToast('Step cannot be empty', true);
            return;
        }

        const stepId = el.dataset.stepId;
        const wfId = el.dataset.wfId;

        const fd = new FormData(); fd.append('text', newText);
        try {
            await apiFetch(`/apps/${APP_ID}/manage/workflows/${wfId}/steps/${stepId}/update`, fd);
            el.dataset.original = newText;
            applyMultilineClass(box);
            showToast('Step saved');
        } catch (e) {
            el.textContent = original;
            applyMultilineClass(box);
            showToast(e.message, true);
        }
    }

    function updateStepCounter(el) {
        const box = el.closest('.step-box');
        const counter = box.querySelector('.step-char-counter');
        if (!counter) return;
        const len = el.textContent.length;
        counter.textContent = `${len}/${STEP_MAX}`;
        counter.classList.toggle('over', len > STEP_MAX);
    }

    function placeCursorAtEnd(el) {
        const range = document.createRange();
        const sel = window.getSelection();
        range.selectNodeContents(el);
        range.collapse(false);
        sel.removeAllRanges();
        sel.addRange(range);
    }

    let _activeWfId = null;

    function updateStepCharHint(input) {
        const len = input.value.length;
        const hint = document.getElementById('stepCharHint');
        const btn = document.getElementById('addStepSubmitBtn');
        hint.textContent = `${len} / ${STEP_MAX}`;
        const over = len > STEP_MAX;
        hint.classList.toggle('over', over);
        btn.disabled = over;
    }

    function openAddStepModal(wfId) {
        _activeWfId = wfId;
        const input = document.getElementById('newStepText');
        input.value = '';
        updateStepCharHint(input);
        openModal('addStepModal');
        setTimeout(() => input.focus(), 80);
    }

    async function createStep() {
        const text = document.getElementById('newStepText').value.trim();
        if (!text || !_activeWfId) return;
        if (text.length > STEP_MAX) return showToast(`Max ${STEP_MAX} characters`, true);
        const fd = new FormData(); fd.append('text', text);
        try {
            const data = await apiFetch(`/apps/${APP_ID}/manage/workflows/${_activeWfId}/steps`, fd);
            closeModal('addStepModal');
            appendStepBox(_activeWfId, data.id, data.text, data.position);
            showToast('Step added');
        } catch (e) { showToast(e.message, true); }
    }

    async function deleteStep(wfId, stepId) {
        try {
            await apiFetch(`/apps/${APP_ID}/manage/workflows/${wfId}/steps/${stepId}/delete`, new FormData());
            removeStepBox(wfId, stepId);
            showToast('Step removed');
        } catch (e) { showToast(e.message, true); }
    }

    // ─── DIAGRAM HELPERS ────────────────────────────────────────────────────
    function redrawDiagram(wfId) {
        const diagram = document.getElementById('steps-' + wfId);
        if (!diagram) return;
        const addBtn = diagram.querySelector('.add-step-circle');
        diagram.querySelectorAll('.step-arrow').forEach(a => a.remove());
        const steps = diagram.querySelectorAll('.step-box');
        steps.forEach((step, i) => {
            if (i < steps.length - 1) {
                const arrow = document.createElement('span');
                arrow.className = 'step-arrow'; arrow.textContent = '→';
                step.after(arrow);
            }
        });
        if (steps.length > 0) {
            const arrow = document.createElement('span');
            arrow.className = 'step-arrow'; arrow.textContent = '→';
            addBtn.before(arrow);
        }
    }

    function appendStepBox(wfId, stepId, text, position) {
        const diagram = document.getElementById('steps-' + wfId);
        const addBtn = diagram.querySelector('.add-step-circle');
        const existingSteps = diagram.querySelectorAll('.step-box').length;
        const box = document.createElement('div');
        box.className = 'step-box'; box.id = 'step-' + stepId;
        box.innerHTML = `
          <div class="step-box-inner">
            <div class="step-box-label">STEP ${existingSteps + 1}</div>
            <div class="step-box-text"
                 contenteditable="true"
                 data-step-id="${stepId}"
                 data-wf-id="${wfId}"
                 data-original="${escHtml(text)}"
                 onkeydown="handleStepKeydown(event, this)"
                 oninput="handleStepInput(this)"
                 onfocus="handleStepFocus(this)"
                 onblur="handleStepBlur(this)">${escHtml(text)}</div>
          </div>
          <span class="step-char-counter">0/70</span>
          <button class="step-box-delete"
                  data-wf-id="${wfId}" data-step-id="${stepId}"
                  onclick="deleteStep(this.dataset.wfId, this.dataset.stepId)">✕</button>`;
        diagram.insertBefore(box, addBtn);
        applyMultilineClass(box);
        redrawDiagram(wfId);
    }

    function removeStepBox(wfId, stepId) {
        const box = document.getElementById('step-' + stepId);
        if (!box) return;
        box.remove();
        const diagram = document.getElementById('steps-' + wfId);
        diagram.querySelectorAll('.step-box-label').forEach((lbl, i) => {
            lbl.textContent = 'STEP ' + (i + 1);
        });
        redrawDiagram(wfId);
    }

    function appendWorkflowBlock(wfId, title) {
        const list = document.getElementById('workflowsList');
        const div = document.createElement('div');
        div.className = 'workflow-block'; div.id = 'wf-' + wfId; div.dataset.wfId = wfId;
        div.innerHTML = `
          <div class="workflow-header">
            <span class="workflow-label">WORKFLOW NAME</span>
            <input type="text" class="workflow-title-input" id="wfTitle-${wfId}"
                   value="${escHtml(title)}" placeholder="Workflow name"
                   data-id="${wfId}"
                   onblur="saveWorkflowTitle(this.dataset.id, this.value)"/>
            <button class="workflow-delete-btn" onclick="deleteWorkflow('${wfId}')">✕</button>
          </div>
          <div class="steps-diagram" id="steps-${wfId}">
            <button class="add-step-circle" data-wf-id="${wfId}"
                    onclick="openAddStepModal(this.dataset.wfId)">+</button>
          </div>`;
        list.appendChild(div);
    }

    function applyMultilineClass(box) {
        const textEl = box.querySelector('.step-box-text');
        if (textEl && textEl.textContent.length > 18) box.classList.add('multiline');
        else box.classList.remove('multiline');
    }

    function escHtml(s) {
        return String(s)
            .replace(/&/g, '&amp;').replace(/</g, '&lt;')
            .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }

    // ─── INIT ────────────────────────────────────────────────────────────────
    document.querySelectorAll('.step-box').forEach(applyMultilineClass);
    document.querySelectorAll('.steps-diagram').forEach(diagram => {
        const wfId = diagram.id.replace('steps-', '');
        redrawDiagram(wfId);
    });
    // Init char counters for existing steps
    document.querySelectorAll('.step-box-text').forEach(el => {
        updateStepCounter(el);
    });
</script>

</body>
</html>
